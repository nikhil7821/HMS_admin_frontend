<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bed Occupancy | Reports | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           BED OCCUPANCY MODULE — Page-specific only
           ============================================================ */

        /* 🔥 FIX: Prevent layout shift */
        .main-content {
            margin-left: 260px !important;
            margin-top: 70px !important;
            padding: 1.25rem 1.5rem !important;
            transition: margin-left 0.3s ease !important;
            min-height: 100vh !important;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        .main-content.loaded {
            opacity: 1;
        }
        #mainSidebar[data-collapsed="true"] ~ .main-content,
        #mainSidebar[data-collapsed="true"] + .main-content {
            margin-left: 72px !important;
        }
        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0 !important;
                padding: 1rem !important;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🔥 Page Header - Hidden */
        .page-header {
            display: none !important;
        }

        /* 🔥 Stats Cards - Perfect Spacing */
        .grid-stats {
            gap: 1rem !important;
            margin-bottom: 1.25rem !important;
        }
        .stat-card {
            padding: 1rem 1.25rem !important;
            border-radius: var(--radius-lg) !important;
        }
        .stat-card .stat-value {
            font-size: 1.5rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-top: 0.125rem !important;
        }
        .stat-card .stat-label {
            font-size: 0.625rem !important;
            letter-spacing: 0.06em !important;
            text-transform: uppercase !important;
            color: var(--color-brown-200) !important;
        }
        .stat-card .stat-icon-bg {
            width: 2.5rem !important;
            height: 2.5rem !important;
            border-radius: var(--radius-md) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: var(--bg-muted) !important;
        }
        .stat-card .stat-icon-bg i {
            font-size: 1rem !important;
        }

        /* 🔥 Chart Container */
        .chart-container {
            background: var(--bg-card) !important;
            border-radius: var(--radius-md) !important;
            border: 1px solid var(--border-default) !important;
            padding: 0.75rem !important;
            box-shadow: var(--shadow-card) !important;
        }
        .chart-container .section-title {
            font-size: 0.75rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .chart-container .section-title i {
            font-size: 0.75rem !important;
        }
        canvas {
            max-height: 160px !important;
            width: 100% !important;
        }

        /* 🔥 Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem !important;
            margin-bottom: 1.25rem !important;
        }
        @media (min-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 🔥 Table */
        .card-white {
            border-radius: var(--radius-lg) !important;
            border: 1px solid var(--border-default) !important;
            overflow: hidden !important;
        }
        .table-wrapper {
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }
        .data-table {
            width: 100% !important;
            border-collapse: collapse !important;
            font-size: 0.8125rem !important;
        }
        .data-table thead {
            background-color: var(--bg-muted) !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .data-table th {
            padding: 0.5rem 1rem !important;
            text-align: left !important;
            font-weight: var(--font-weight-medium) !important;
            color: var(--color-brown-300) !important;
            font-size: 0.625rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
        }
        .data-table td {
            padding: 0.5rem 1rem !important;
            color: var(--color-brown-700) !important;
            vertical-align: middle !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .data-table tbody tr:last-child td {
            border-bottom: none !important;
        }

        /* 🔥 Table Row */
        .report-row {
            transition: var(--transition-base) !important;
        }
        .report-row:hover {
            background-color: var(--bg-subtle) !important;
        }

        /* 🔥 Status Badges */
        .badge-critical {
            background: var(--color-error-bg) !important;
            color: var(--color-error-text) !important;
            padding: 0.15rem 0.625rem !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            display: inline-block !important;
        }
        .badge-high {
            background: var(--color-warning-bg) !important;
            color: var(--color-warning-text) !important;
            padding: 0.15rem 0.625rem !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            display: inline-block !important;
        }
        .badge-normal {
            background: var(--color-success-bg) !important;
            color: var(--color-success-text) !important;
            padding: 0.15rem 0.625rem !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            display: inline-block !important;
        }

        /* 🔥 Progress Bar */
        .progress-bar {
            background: linear-gradient(90deg, var(--color-sage) 0%, var(--color-sage-dark) 100%) !important;
            border-radius: var(--radius-full) !important;
            height: 6px !important;
            transition: width 0.3s ease !important;
        }
        .progress-bar-critical {
            background: linear-gradient(90deg, var(--color-error-text) 0%, #b91c1c 100%) !important;
        }
        .progress-bar-high {
            background: linear-gradient(90deg, var(--color-warning-text) 0%, #b45309 100%) !important;
        }

        /* 🔥 Print Button */
        .btn-secondary {
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.375rem !important;
            padding: 0.375rem 0.875rem !important;
            font-size: 0.8125rem !important;
            height: 36px !important;
            border-radius: var(--radius-md) !important;
            background-color: transparent !important;
            color: var(--color-brown-200) !important;
            border: 1px solid var(--border-input) !important;
            cursor: pointer !important;
            font-family: var(--font-family) !important;
        }
        .btn-secondary:hover {
            background-color: var(--bg-hover) !important;
            color: var(--color-brown-600) !important;
            border-color: var(--color-brown-100) !important;
        }

        /* 🔥 Stat Card Border Colors */
        .stat-card-sage { border-left: 4px solid var(--color-sage) !important; }
        .stat-card-error { border-left: 4px solid var(--color-error-text) !important; }
        .stat-card-success { border-left: 4px solid var(--color-success-text) !important; }
        .stat-card-warning { border-left: 4px solid var(--color-warning-text) !important; }

        .text-error-text { color: var(--color-error-text) !important; }
        .text-success-text { color: var(--color-success-text) !important; }
        .text-warning-text { color: var(--color-warning-text) !important; }

        /* 🔥 Table Header Title */
        .table-header-title {
            padding: 0.5rem 1rem !important;
            border-bottom: 1px solid var(--border-default) !important;
            font-size: 0.6875rem !important;
            font-weight: var(--font-weight-medium) !important;
            color: var(--color-brown-300) !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
        }
        .table-header-title i {
            font-size: 0.6875rem !important;
            color: var(--color-sage) !important;
            margin-right: 0.375rem !important;
        }

        /* 🔥 Print styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0 !important; padding: 20px !important; }
            .stat-card { border: 1px solid #ddd !important; break-inside: avoid !important; }
            .card-white { break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content" id="mainContent">
        
        <!-- Stats Cards -->
        <div class="grid-stats">
            <div class="stat-card stat-card-sage">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Beds</p>
                        <p class="stat-value" id="totalBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-bed" style="color:var(--color-sage);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-error">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Occupied Beds</p>
                        <p class="stat-value text-error-text" id="occupiedBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-circle" style="color:var(--color-error-text);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-success">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Available Beds</p>
                        <p class="stat-value text-success-text" id="availableBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle" style="color:var(--color-success-text);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-warning">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Occupancy Rate</p>
                        <p class="stat-value text-warning-text" id="occupancyRate">0%</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-line" style="color:var(--color-warning-text);"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Print Button -->
        <div class="no-print" style="margin-bottom:1rem;">
            <button id="printReport" class="btn-secondary">
                <i class="fas fa-print"></i>
                <span>Print Report</span>
            </button>
        </div>

        <!-- Charts Row -->
        <div class="charts-grid">
            <div class="chart-container">
                <div class="section-title">
                    <i class="fas fa-chart-bar" style="color:var(--color-sage);"></i>
                    Ward-wise Occupancy Rate
                </div>
                <canvas id="wardChart" height="150"></canvas>
            </div>
            <div class="chart-container">
                <div class="section-title">
                    <i class="fas fa-chart-pie" style="color:var(--color-sage);"></i>
                    Bed Status Distribution
                </div>
                <canvas id="statusChart" height="150"></canvas>
            </div>
        </div>

        <!-- Ward-wise Breakdown Table -->
        <div class="card-white">
            <div class="table-header-title">
                <i class="fas fa-building"></i> Ward-wise Bed Breakdown
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="min-width:120px;">Ward Name</th>
                            <th style="text-align:right;">Total</th>
                            <th style="text-align:right;">Occupied</th>
                            <th style="text-align:right;">Available</th>
                            <th style="text-align:right;">Occupancy</th>
                            <th style="text-align:center;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="wardTable">
                        <tr>
                            <td colspan="6" style="text-align:center; padding:2rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:1.5rem; margin-bottom:0.5rem; display:block;"></i>
                                <p style="font-size:0.75rem; font-weight:var(--font-weight-light);">Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="bed-occupancy.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var checkSidebar = setInterval(function() {
                var sidebar = document.getElementById('mainSidebar');
                if (sidebar) {
                    clearInterval(checkSidebar);
                    document.getElementById('mainContent').classList.add('loaded');
                }
            }, 50);
            setTimeout(function() {
                document.getElementById('mainContent').classList.add('loaded');
            }, 1000);
        });
    </script>
    
</body>
</html>
