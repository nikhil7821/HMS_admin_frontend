<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bed Occupancy | Reports | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .report-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .report-row:hover {
            background-color: var(--bg-subtle);
        }
        
        .badge-critical {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-high {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-normal {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .progress-bar {
            background: linear-gradient(90deg, var(--color-sage) 0%, var(--color-sage-dark) 100%);
            border-radius: var(--radius-full);
            height: 6px;
            transition: width 0.3s ease;
        }
        
        .progress-bar-critical {
            background: linear-gradient(90deg, var(--color-error-text) 0%, #b91c1c 100%);
        }
        
        .progress-bar-high {
            background: linear-gradient(90deg, var(--color-warning-text) 0%, #b45309 100%);
        }
        
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            padding: 0.75rem;
            box-shadow: var(--shadow-card);
        }
        
        .chart-container .section-title {
            font-size: 0.75rem !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
        }
        
        .chart-container .section-title i {
            font-size: 0.75rem !important;
        }
        
        canvas {
            max-height: 160px;
            width: 100%;
        }
        
        .border-l-sage {
            border-left-color: var(--color-sage) !important;
        }
        
        .border-l-error {
            border-left-color: var(--color-error-text) !important;
        }
        
        .border-l-success {
            border-left-color: var(--color-success-text) !important;
        }
        
        .border-l-warning {
            border-left-color: var(--color-warning-text) !important;
        }
        
        /* Smaller stats cards */
        .stat-card-sm .stat-value {
            font-size: 1.25rem !important;
        }
        
        @media print {
            .no-print {
                display: none;
            }
            body {
                background: white;
                margin: 0;
                padding: 20px;
            }
            .stat-card, .bg-white {
                border: 1px solid #ddd;
                break-inside: avoid;
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-5">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-bed-pulse"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Bed Occupancy Report</h1>
                    <p class="page-header-subtitle">Track bed utilization across all hospital wards</p>
                </div>
            </div>
        </div>

        <!-- Print Button -->
        <div class="no-print mb-5">
            <button id="printReport" class="btn-secondary">
                <i class="fas fa-print mr-1"></i> Print Report
            </button>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-6">
            <div class="stat-card" style="border-left: 4px solid var(--color-sage);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Beds</p>
                        <p class="stat-value" id="totalBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-bed text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-error-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Occupied Beds</p>
                        <p class="stat-value text-error-text" id="occupiedBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-success-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Available Beds</p>
                        <p class="stat-value text-success-text" id="availableBeds">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warning-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Occupancy Rate</p>
                        <p class="stat-value text-warning-text" id="occupancyRate">0%</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-line text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row - Reduced Size -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">
            <div class="chart-container">
                <h3 class="section-title text-sm mb-2 pb-1.5 border-b border-default">
                    <i class="fas fa-chart-bar text-sage"></i> Ward-wise Occupancy Rate
                </h3>
                <canvas id="wardChart" height="150"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="section-title text-sm mb-2 pb-1.5 border-b border-default">
                    <i class="fas fa-chart-pie text-sage"></i> Bed Status Distribution
                </h3>
                <canvas id="statusChart" height="150"></canvas>
            </div>
        </div>

        <!-- Ward-wise Breakdown Table -->
        <div class="card-white overflow-hidden">
            <div class="px-5 py-2.5 border-b border-default">
                <h3 class="section-title text-xs mb-0">
                    <i class="fas fa-building text-sage"></i> Ward-wise Bed Breakdown
                </h3>
            </div>
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-2">Ward Name</th>
                            <th class="px-5 py-2 text-right">Total Beds</th>
                            <th class="px-5 py-2 text-right">Occupied</th>
                            <th class="px-5 py-2 text-right">Available</th>
                            <th class="px-5 py-2 text-right">Occupancy Rate</th>
                            <th class="px-5 py-2 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="wardTable">
                        <tr>
                            <td colspan="6" class="text-center py-10 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-xl mb-1 block"></i>
                                <p class="text-xs font-light">Loading data...</p>
                            </tr>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="bed-occupancy.js"></script>
    
</body>
</html>
