<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Revenue Reports | Reports | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Theme CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           REVENUE REPORTS MODULE — Page-specific only
           ============================================================ */

        /* 🔥 FIX: Prevent layout shift */
        .main-content {
            margin-left: 260px !important;
            margin-top: 70px !important;
            padding: 1.25rem 1.5rem !important;
            transition: margin-left 0.3s ease !important;
            min-height: 100vh !important;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        .main-content.loaded {
            opacity: 1;
        }
        #mainSidebar[data-collapsed="true"] ~ .main-content,
        #mainSidebar[data-collapsed="true"] + .main-content {
            margin-left: 72px !important;
        }
        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0 !important;
                padding: 1rem !important;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🔥 Page Header - Hidden */
        .page-header {
            display: none !important;
        }

        /* 🔥 Stats Cards - Perfect Spacing */
        .grid-stats {
            gap: 1rem !important;
            margin-bottom: 1.25rem !important;
        }
        .stat-card {
            padding: 1rem 1.25rem !important;
            border-radius: var(--radius-lg) !important;
        }
        .stat-card .stat-value {
            font-size: 1.5rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-top: 0.125rem !important;
        }
        .stat-card .stat-label {
            font-size: 0.625rem !important;
            letter-spacing: 0.06em !important;
            text-transform: uppercase !important;
            color: var(--color-brown-200) !important;
        }
        .stat-card .stat-icon-bg {
            width: 2.5rem !important;
            height: 2.5rem !important;
            border-radius: var(--radius-md) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: var(--bg-muted) !important;
        }
        .stat-card .stat-icon-bg i {
            font-size: 1rem !important;
        }

        /* 🔥 Filter Bar - Perfect Alignment */
        .filter-bar {
            padding: 0.625rem 1rem !important;
            gap: 0.625rem !important;
            margin-bottom: 1.25rem !important;
            border-radius: var(--radius-lg) !important;
            background: var(--bg-card) !important;
            border: 1px solid var(--border-default) !important;
            display: flex !important;
            align-items: center !important;
            flex-wrap: wrap !important;
        }
        .filter-bar .filter-group {
            display: flex !important;
            align-items: center !important;
            gap: 0.375rem !important;
        }
        .filter-bar .filter-group .form-label {
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            color: var(--color-brown-200) !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
            margin-bottom: 0 !important;
            display: inline-block !important;
        }
        .filter-bar .form-input {
            min-width: 140px !important;
            max-width: 180px !important;
            padding: 0.375rem 0.75rem !important;
            font-size: 0.8125rem !important;
            height: 36px !important;
            border: 1px solid var(--border-input) !important;
            border-radius: var(--radius-md) !important;
            background-color: var(--bg-card) !important;
            color: var(--color-brown-700) !important;
            font-family: var(--font-family) !important;
        }
        .filter-bar .form-input:focus {
            border-color: var(--color-sage-light) !important;
            box-shadow: 0 0 0 3px rgba(181, 207, 170, 0.15) !important;
            outline: none !important;
        }
        .filter-bar .btn-primary,
        .filter-bar .btn-secondary {
            flex: 0 0 auto !important;
            padding: 0.375rem 0.875rem !important;
            font-size: 0.8125rem !important;
            height: 36px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.375rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            font-family: var(--font-family) !important;
            cursor: pointer !important;
        }
        .filter-bar .btn-primary {
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }
        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.3) !important;
            transform: translateY(-1px) !important;
        }
        .filter-bar .btn-secondary {
            background-color: transparent !important;
            color: var(--color-brown-200) !important;
            border: 1px solid var(--border-input) !important;
        }
        .filter-bar .btn-secondary:hover {
            background-color: var(--bg-hover) !important;
            color: var(--color-brown-600) !important;
            border-color: var(--color-brown-100) !important;
        }

        @media (max-width: 768px) {
            .filter-bar {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 0.5rem !important;
                padding: 0.75rem !important;
            }
            .filter-bar .filter-group {
                flex-wrap: wrap !important;
            }
            .filter-bar .form-input {
                max-width: 100% !important;
            }
            .filter-bar .btn-primary span,
            .filter-bar .btn-secondary span {
                display: none !important;
            }
        }

        /* 🔥 Chart Container */
        .chart-container {
            background: var(--bg-card) !important;
            border-radius: var(--radius-md) !important;
            border: 1px solid var(--border-default) !important;
            padding: 0.75rem !important;
            box-shadow: var(--shadow-card) !important;
        }
        .chart-container .section-title {
            font-size: 0.75rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .chart-container .section-title i {
            font-size: 0.75rem !important;
        }
        canvas {
            max-height: 160px !important;
            width: 100% !important;
        }

        /* 🔥 Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem !important;
            margin-bottom: 1.25rem !important;
        }
        @media (min-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 🔥 Table */
        .card-white {
            border-radius: var(--radius-lg) !important;
            border: 1px solid var(--border-default) !important;
            overflow: hidden !important;
        }
        .table-wrapper {
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
        }
        .data-table {
            width: 100% !important;
            border-collapse: collapse !important;
            font-size: 0.8125rem !important;
        }
        .data-table thead {
            background-color: var(--bg-muted) !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .data-table th {
            padding: 0.5rem 1rem !important;
            text-align: left !important;
            font-weight: var(--font-weight-medium) !important;
            color: var(--color-brown-300) !important;
            font-size: 0.625rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
        }
        .data-table td {
            padding: 0.5rem 1rem !important;
            color: var(--color-brown-700) !important;
            vertical-align: middle !important;
            border-bottom: 1px solid var(--border-default) !important;
        }
        .data-table tbody tr:last-child td {
            border-bottom: none !important;
        }

        /* 🔥 Table Row */
        .report-row {
            transition: var(--transition-base) !important;
        }
        .report-row:hover {
            background-color: var(--bg-subtle) !important;
        }

        /* 🔥 Status Badges */
        .status-paid {
            background: var(--color-success-bg) !important;
            color: var(--color-success-text) !important;
            padding: 0.15rem 0.625rem !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            display: inline-block !important;
        }
        .status-pending {
            background: var(--color-warning-bg) !important;
            color: var(--color-warning-text) !important;
            padding: 0.15rem 0.625rem !important;
            border-radius: var(--radius-full) !important;
            font-size: 0.625rem !important;
            font-weight: var(--font-weight-medium) !important;
            display: inline-block !important;
        }

        /* 🔥 Table Header Title */
        .table-header-title {
            padding: 0.5rem 1rem !important;
            border-bottom: 1px solid var(--border-default) !important;
            font-size: 0.6875rem !important;
            font-weight: var(--font-weight-medium) !important;
            color: var(--color-brown-300) !important;
            text-transform: uppercase !important;
            letter-spacing: 0.06em !important;
        }
        .table-header-title i {
            font-size: 0.6875rem !important;
            color: var(--color-sage) !important;
            margin-right: 0.375rem !important;
        }

        /* 🔥 Stat Card Border Colors */
        .stat-card-green { border-left: 4px solid var(--color-success-text) !important; }
        .stat-card-yellow { border-left: 4px solid var(--color-warning-text) !important; }
        .stat-card-blue { border-left: 4px solid #3b82f6 !important; }
        .stat-card-purple { border-left: 4px solid #9333ea !important; }

        .text-success-text { color: var(--color-success-text) !important; }
        .text-warning-text { color: var(--color-warning-text) !important; }

        /* 🔥 Print styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0 !important; padding: 20px !important; }
            .stat-card { break-inside: avoid !important; }
            .card-white { break-inside: avoid !important; }
            .report-row { break-inside: avoid !important; }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content" id="mainContent">
        
        <!-- Stats Cards -->
        <div class="grid-stats">
            <div class="stat-card stat-card-green">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Revenue</p>
                        <p class="stat-value text-success-text" id="totalRevenue">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign" style="color:var(--color-success-text);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-yellow">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Pending Amount</p>
                        <p class="stat-value text-warning-text" id="pendingRevenue">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-clock" style="color:var(--color-warning-text);"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-blue">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Collection Rate</p>
                        <p class="stat-value" style="color:#3b82f6;" id="collectionRate">0%</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-pie" style="color:#3b82f6;"></i>
                    </div>
                </div>
            </div>
            <div class="stat-card stat-card-purple">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Invoices</p>
                        <p class="stat-value" style="color:#9333ea;" id="totalInvoices">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-file-invoice" style="color:#9333ea;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar no-print">
            <div class="filter-group">
                <label class="form-label">From</label>
                <input type="date" id="fromDate" class="form-input">
            </div>
            <div class="filter-group">
                <label class="form-label">To</label>
                <input type="date" id="toDate" class="form-input">
            </div>
            <button id="applyFilter" class="btn-primary">
                <i class="fas fa-filter"></i>
                <span>Apply</span>
            </button>
            <button id="printReport" class="btn-secondary">
                <i class="fas fa-print"></i>
                <span>Print</span>
            </button>
        </div>

        <!-- Charts Row -->
        <div class="charts-grid">
            <div class="chart-container">
                <div class="section-title">
                    <i class="fas fa-chart-line" style="color:var(--color-sage);"></i>
                    Daily Revenue Trend
                </div>
                <canvas id="revenueTrendChart" height="150"></canvas>
            </div>
            <div class="chart-container">
                <div class="section-title">
                    <i class="fas fa-chart-pie" style="color:var(--color-sage);"></i>
                    Revenue by Department
                </div>
                <canvas id="deptChart" height="150"></canvas>
            </div>
        </div>

        <!-- Monthly Breakdown Table -->
        <div class="card-white">
            <div class="table-header-title">
                <i class="fas fa-calendar-alt"></i> Monthly Breakdown
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="min-width:90px;">Month</th>
                            <th style="text-align:right;">OPD</th>
                            <th style="text-align:right;">IPD</th>
                            <th style="text-align:right;">Pharmacy</th>
                            <th style="text-align:right;">Lab</th>
                            <th style="text-align:right;">Radiology</th>
                            <th style="text-align:right;">Total</th>
                        </tr>
                    </thead>
                    <tbody id="monthlyTable">
                        <tr>
                            <td colspan="7" style="text-align:center; padding:2rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:1.5rem; margin-bottom:0.5rem; display:block;"></i>
                                <p style="font-size:0.75rem; font-weight:var(--font-weight-light);">Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="revenue-reports.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var checkSidebar = setInterval(function() {
                var sidebar = document.getElementById('mainSidebar');
                if (sidebar) {
                    clearInterval(checkSidebar);
                    document.getElementById('mainContent').classList.add('loaded');
                }
            }, 50);
            setTimeout(function() {
                document.getElementById('mainContent').classList.add('loaded');
            }, 1000);
        });
    </script>
    
</body>
</html>
