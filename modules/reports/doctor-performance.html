<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doctor Performance | Reports | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .rating-star {
            color: var(--color-gold);
            font-size: 0.6875rem;
        }
        
        .rating-star-empty {
            color: var(--border-default);
            font-size: 0.6875rem;
        }
        
        .chart-container {
            position: relative;
            height: 280px;
            width: 100%;
        }
        
        .border-l-sage {
            border-left-color: var(--color-sage) !important;
        }
        
        .border-l-sage-dark {
            border-left-color: var(--color-sage-dark) !important;
        }
        
        .border-l-gold {
            border-left-color: var(--color-gold) !important;
        }
        
        .border-l-tan {
            border-left-color: var(--color-warm-tan) !important;
        }
        
        @media print {
            body * {
                visibility: hidden;
            }
            .print-area, .print-area * {
                visibility: visible;
            }
            .print-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                padding: 20px;
            }
            .no-print {
                display: none;
            }
            .stat-card, .content-card, .filter-card {
                break-inside: avoid;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-chart-simple"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Doctor Performance</h1>
                    <p class="page-header-subtitle">Track doctor-wise consultations, revenue, and patient feedback</p>
                </div>
            </div>
        </div>

        <!-- Filter Bar using theme classes -->
        <div class="filter-bar">
            <div>
                <label class="form-label text-xs mb-1">From Date</label>
                <input type="date" id="fromDate" class="form-input w-auto min-w-[160px]">
            </div>
            <div>
                <label class="form-label text-xs mb-1">To Date</label>
                <input type="date" id="toDate" class="form-input w-auto min-w-[160px]">
            </div>
            <button id="applyFilter" class="btn-primary">
                <i class="fas fa-search mr-1"></i> Apply
            </button>
            <button id="printReport" class="btn-secondary">
                <i class="fas fa-print mr-1"></i> Print
            </button>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt mr-1"></i> Reset
            </button>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid var(--color-sage);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Doctors</p>
                        <p class="stat-value" id="totalDoctors">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-md text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-sage-dark);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Consultations</p>
                        <p class="stat-value text-sage-dark" id="totalConsultations">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-stethoscope text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-gold);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Revenue</p>
                        <p class="stat-value text-gold" id="doctorRevenue">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warm-tan);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Avg per Doctor</p>
                        <p class="stat-value text-tan" id="avgPerDoctor">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-line text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Card -->
        <div class="card-white p-4 mb-6">
            <h3 class="section-title text-sm mb-4">
                <i class="fas fa-chart-bar text-sage"></i> Consultations by Doctor
            </h3>
            <div class="chart-container">
                <canvas id="doctorChart"></canvas>
            </div>
        </div>

        <!-- Doctor-wise Breakdown Table -->
        <div class="card-white overflow-hidden">
            <div class="px-5 py-3 border-b border-default">
                <h3 class="section-title text-sm mb-0">
                    <i class="fas fa-table-list text-sage"></i> Doctor-wise Breakdown
                </h3>
            </div>
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-4 py-3">Doctor Name</th>
                            <th class="px-4 py-3">Specialization</th>
                            <th class="px-4 py-3 text-center">Consultations</th>
                            <th class="px-4 py-3 text-right">Revenue</th>
                            <th class="px-4 py-3 text-center">Avg Rating</th>
                        </tr>
                    </thead>
                    <tbody id="doctorTable">
                        <tr>
                            <td colspan="5" class="text-center py-12 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                                <p class="font-light">Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="doctor-performance.js"></script>
    
</body>
</html>
