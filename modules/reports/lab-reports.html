<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lab Activity | Reports | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .report-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .report-row:hover {
            background-color: var(--bg-subtle);
        }
        
        .status-completed {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-pending {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-progress {
            background: var(--color-info-bg);
            color: var(--color-info-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .trend-bar {
            height: 6px;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, var(--color-sage), var(--color-sage-dark));
        }
        
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            padding: 0.75rem;
            box-shadow: var(--shadow-card);
        }
        
        .chart-container .section-title {
            font-size: 0.75rem !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
        }
        
        canvas {
            max-height: 160px;
            width: 100%;
        }
        
        .border-l-blue-500 {
            border-left-color: #3b82f6 !important;
        }
        
        .border-l-green-500 {
            border-left-color: var(--color-success-text) !important;
        }
        
        .border-l-yellow-500 {
            border-left-color: var(--color-warning-text) !important;
        }
        
        .border-l-purple-500 {
            border-left-color: #9333ea !important;
        }
        
        @media print {
            .no-print { display: none; }
            body { background: white; margin: 0; padding: 20px; }
            .stat-card, .bg-white { border: 1px solid #ddd; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-flask"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Laboratory Activity Report</h1>
                    <p class="page-header-subtitle">Track lab test requests, completion rates, and revenue</p>
                </div>
            </div>
        </div>

        <!-- Date Filter Bar -->
        <div class="filter-bar no-print">
            <div>
                <label class="form-label text-xs mb-1">From Date</label>
                <input type="date" id="fromDate" class="form-input w-40">
            </div>
            <div>
                <label class="form-label text-xs mb-1">To Date</label>
                <input type="date" id="toDate" class="form-input w-40">
            </div>
            <button id="applyFilter" class="btn-primary">
                <i class="fas fa-filter mr-1"></i> Apply
            </button>
            <button id="printReport" class="btn-secondary">
                <i class="fas fa-print mr-1"></i> Print
            </button>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid #3b82f6;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Requests</p>
                        <p class="stat-value" id="totalRequests">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-flask text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-success-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Completed</p>
                        <p class="stat-value text-success-text" id="completedRequests">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warning-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Pending</p>
                        <p class="stat-value text-warning-text" id="pendingRequests">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-clock text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid #9333ea;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Lab Revenue</p>
                        <p class="stat-value" style="color: #9333ea;" id="labRevenue">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row - Reduced Size -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <div class="chart-container">
                <h3 class="section-title text-sm mb-2 pb-1.5 border-b border-default">
                    <i class="fas fa-chart-bar text-sage"></i> Test-wise Distribution
                </h3>
                <canvas id="testChart" height="150"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="section-title text-sm mb-2 pb-1.5 border-b border-default">
                    <i class="fas fa-chart-pie text-sage"></i> Status Breakdown
                </h3>
                <canvas id="statusChart" height="150"></canvas>
            </div>
        </div>

        <!-- Popular Tests Table -->
        <div class="card-white overflow-hidden">
            <div class="px-5 py-2.5 border-b border-default">
                <h3 class="section-title text-xs mb-0">
                    <i class="fas fa-chart-line text-sage"></i> Popular Tests
                </h3>
            </div>
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-2">Test Name</th>
                            <th class="px-5 py-2 text-right">Requests</th>
                            <th class="px-5 py-2 text-right">Completed</th>
                            <th class="px-5 py-2 text-right">Revenue</th>
                            <th class="px-5 py-2">Trend</th>
                        </tr>
                    </thead>
                    <tbody id="popularTestsTable">
                        <tr>
                            <td colspan="5" class="text-center py-10 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-xl mb-1 block"></i>
                                <p class="text-xs font-light">Loading data...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="lab-reports.js"></script>
    
</body>
</html>
