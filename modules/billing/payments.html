<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Payments | Billing | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .payment-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .payment-row:hover {
            background-color: var(--bg-subtle);
        }
        
        .payment-method-badge {
            background: var(--color-info-bg);
            color: var(--color-info-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .border-l-blue-500 {
            border-left-color: #3b82f6 !important;
        }
        
        .border-l-green-500 {
            border-left-color: var(--color-success-text) !important;
        }
        
        .border-l-yellow-500 {
            border-left-color: var(--color-warning-text) !important;
        }
        
        .border-l-purple-500 {
            border-left-color: #9333ea !important;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Payment History</h1>
                    <p class="page-header-subtitle">Track all patient payments and transactions</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid #3b82f6;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Collected</p>
                        <p class="stat-value" id="totalCollected">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-success-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">This Month</p>
                        <p class="stat-value" id="monthCollected">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warning-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Today</p>
                        <p class="stat-value" id="todayCollected">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-sun text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid #9333ea;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Transactions</p>
                        <p class="stat-value" id="totalTransactions">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-receipt text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Payments Table -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-3">Date</th>
                            <th class="px-5 py-3">Patient</th>
                            <th class="px-5 py-3">Invoice #</th>
                            <th class="px-5 py-3">Amount</th>
                            <th class="px-5 py-3">Method</th>
                            <th class="px-5 py-3">Transaction ID</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTable">
                        <tr>
                            <td colspan="6" class="text-center py-12 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                                <p class="font-light">Loading payments...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="payments.js"></script>
    
</body>
</html>
