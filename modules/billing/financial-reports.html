<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Financial Reports | Billing | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            padding: 0.75rem;
            box-shadow: var(--shadow-card);
            transition: var(--transition-base);
        }
        
        .chart-container:hover {
            box-shadow: var(--shadow-md);
        }
        
        .revenue-type-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        
        .revenue-type-item:last-child {
            border-bottom: none;
        }
        
        .revenue-type-label {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-600);
        }
        
        .revenue-type-value {
            font-size: 0.8125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-700);
        }
        
        .monthly-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        
        .monthly-item:last-child {
            border-bottom: none;
        }
        
        .monthly-month {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-600);
        }
        
        .monthly-amount {
            font-size: 0.8125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-sage-dark);
        }
        
        .border-l-blue-500 {
            border-left-color: #3b82f6 !important;
        }
        
        .border-l-green-500 {
            border-left-color: var(--color-success-text) !important;
        }
        
        .border-l-purple-500 {
            border-left-color: #9333ea !important;
        }
        
        /* Smaller stat cards */
        .stat-card-sm {
            padding: 0.75rem !important;
        }
        
        .stat-card-sm .stat-value {
            font-size: 1.25rem !important;
            margin-top: 0 !important;
            font-weight: var(--font-weight-medium) !important;
        }
        
        .stat-card-sm .stat-label {
            font-size: 0.6rem !important;
            letter-spacing: 0.04em !important;
        }
        
        .stat-card-sm .stat-icon-bg {
            width: 1.75rem !important;
            height: 1.75rem !important;
            border-radius: var(--radius-sm) !important;
        }
        
        .stat-card-sm .stat-icon-bg i {
            font-size: 0.75rem !important;
        }
        
        /* Section title */
        .section-title-sm {
            font-size: 0.75rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
        }
        
        .section-title-sm i {
            font-size: 0.75rem !important;
        }
        
        /* Chart canvas */
        canvas {
            max-height: 140px;
            width: 100%;
        }
        
        /* Revenue by department container */
        .revenue-list-container {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .revenue-list-container::-webkit-scrollbar {
            width: 3px;
        }
        
        /* Monthly summary container */
        .monthly-list-container {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .monthly-list-container::-webkit-scrollbar {
            width: 3px;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-4 md:p-5 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header - compact -->
        <div class="page-header mb-4 py-3 px-4">
            <div class="page-header-left">
                <div class="page-header-icon w-8 h-8">
                    <i class="fas fa-chart-pie text-sm"></i>
                </div>
                <div>
                    <h1 class="page-header-title text-sm">Financial Reports</h1>
                    <p class="page-header-subtitle text-xs">Revenue analytics and financial insights</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards - Compact Size -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
            <div class="stat-card stat-card-sm" style="border-left: 3px solid #3b82f6;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Revenue</p>
                        <p class="stat-value" id="reportTotal">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card stat-card-sm" style="border-left: 3px solid var(--color-success-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Average Transaction</p>
                        <p class="stat-value" id="avgTransaction">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-line text-sage"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card stat-card-sm" style="border-left: 3px solid #9333ea;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Transactions</p>
                        <p class="stat-value" id="totalTransactions">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-receipt text-sage"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row - Compact -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-3 mb-5">
            <div class="chart-container">
                <h3 class="section-title-sm flex items-center gap-1.5 border-b border-default pb-1.5 mb-2">
                    <i class="fas fa-chart-line text-sage text-xs"></i> 
                    <span class="text-xs font-medium text-brown-700">Revenue Trend (Last 7 Days)</span>
                </h3>
                <canvas id="revenueChart" height="130"></canvas>
            </div>
            <div class="chart-container">
                <h3 class="section-title-sm flex items-center gap-1.5 border-b border-default pb-1.5 mb-2">
                    <i class="fas fa-chart-pie text-sage text-xs"></i> 
                    <span class="text-xs font-medium text-brown-700">Payment Method Distribution</span>
                </h3>
                <canvas id="paymentMethodChart" height="130"></canvas>
            </div>
        </div>

        <!-- Revenue by Type / Department - Compact & Fixed -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="chart-container">
                <h3 class="section-title-sm flex items-center gap-1.5 border-b border-default pb-1.5 mb-2">
                    <i class="fas fa-building text-sage text-xs"></i> 
                    <span class="text-xs font-medium text-brown-700">Revenue by Department</span>
                </h3>
                <div id="revenueByType" class="revenue-list-container">
                    <div class="empty-state-sm text-center py-4">
                        <i class="fas fa-spinner fa-pulse text-brown-100 text-sm"></i>
                        <p class="text-brown-100 text-xs mt-1">Loading data...</p>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <h3 class="section-title-sm flex items-center gap-1.5 border-b border-default pb-1.5 mb-2">
                    <i class="fas fa-calendar-week text-sage text-xs"></i> 
                    <span class="text-xs font-medium text-brown-700">Monthly Summary</span>
                </h3>
                <div id="monthlySummary" class="monthly-list-container">
                    <div class="empty-state-sm text-center py-4">
                        <i class="fas fa-spinner fa-pulse text-brown-100 text-sm"></i>
                        <p class="text-brown-100 text-xs mt-1">Loading data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="financial-reports.js"></script>
    
    <script>
        // Additional styling for revenue items when loaded
        document.addEventListener('DOMContentLoaded', function() {
            // Monitor for when revenue data is loaded
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.type === 'childList') {
                        const revenueItems = document.querySelectorAll('.revenue-type-item');
                        revenueItems.forEach(item => {
                            item.classList.add('px-1');
                        });
                    }
                });
            });
            
            const revenueContainer = document.getElementById('revenueByType');
            if (revenueContainer) {
                observer.observe(revenueContainer, { childList: true, subtree: true });
            }
        });
    </script>
</body>
</html>
