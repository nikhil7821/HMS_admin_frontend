<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Financial Reports | Billing | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           FINANCIAL REPORTS MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* 🔥 FIX: Prevent layout shift */
        .main-content {
            margin-left: 260px !important;
            margin-top: 70px !important;
            padding: 1.25rem !important;
            transition: margin-left 0.3s ease !important;
            min-height: 100vh !important;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        .main-content.loaded {
            opacity: 1;
        }
        #mainSidebar[data-collapsed="true"] ~ .main-content,
        #mainSidebar[data-collapsed="true"] + .main-content {
            margin-left: 72px !important;
        }
        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0 !important;
                padding: 1rem !important;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Chart container */
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            padding: 0.75rem;
            box-shadow: var(--shadow-card);
            transition: var(--transition-base);
        }
        .chart-container:hover {
            box-shadow: var(--shadow-md);
        }

        /* Revenue type items */
        .revenue-type-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        .revenue-type-item:last-child {
            border-bottom: none;
        }
        .revenue-type-label {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-600);
        }
        .revenue-type-value {
            font-size: 0.8125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-700);
        }

        /* Monthly items */
        .monthly-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.25rem;
            border-bottom: 1px solid var(--border-default);
        }
        .monthly-item:last-child {
            border-bottom: none;
        }
        .monthly-month {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-600);
        }
        .monthly-amount {
            font-size: 0.8125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-sage-dark);
        }

        /* Stat card compact */
        .stat-card-sm {
            padding: 0.75rem !important;
        }
        .stat-card-sm .stat-value {
            font-size: 1.25rem !important;
            margin-top: 0 !important;
            font-weight: var(--font-weight-medium) !important;
        }
        .stat-card-sm .stat-label {
            font-size: 0.6rem !important;
            letter-spacing: 0.04em !important;
        }
        .stat-card-sm .stat-icon-bg {
            width: 1.75rem !important;
            height: 1.75rem !important;
            border-radius: var(--radius-sm) !important;
        }
        .stat-card-sm .stat-icon-bg i {
            font-size: 0.75rem !important;
        }

        /* Section title */
        .section-title-sm {
            font-size: 0.75rem !important;
            font-weight: var(--font-weight-medium) !important;
            margin-bottom: 0.5rem !important;
            padding-bottom: 0.375rem !important;
            border-bottom: 1px solid var(--border-default);
        }
        .section-title-sm i {
            font-size: 0.75rem !important;
        }

        /* Revenue list container */
        .revenue-list-container {
            max-height: 200px;
            overflow-y: auto;
        }
        .revenue-list-container::-webkit-scrollbar {
            width: 3px;
        }
        .revenue-list-container::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: var(--radius-full);
        }

        /* Monthly list container */
        .monthly-list-container {
            max-height: 200px;
            overflow-y: auto;
        }
        .monthly-list-container::-webkit-scrollbar {
            width: 3px;
        }
        .monthly-list-container::-webkit-scrollbar-thumb {
            background: var(--border-default);
            border-radius: var(--radius-full);
        }

        /* Empty state */
        .empty-state-sm {
            text-align: center;
            padding: 2rem 0.5rem;
            color: var(--color-brown-100);
        }
        .empty-state-sm i {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            display: block;
            opacity: 0.4;
        }
        .empty-state-sm p {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
        }

        /* Grid layouts */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        @media (min-width: 640px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        @media (min-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .revenue-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 768px) {
            .revenue-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Stat card border colors */
        .stat-card-blue { border-left: 3px solid #3b82f6; }
        .stat-card-green { border-left: 3px solid var(--color-success-text); }
        .stat-card-purple { border-left: 3px solid #9333ea; }

        /* Type colors */
        .type-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
        }
        .type-badge.opd { background: #dbeafe; color: #2563eb; }
        .type-badge.ipd { background: #e9d5ff; color: #7c3aed; }
        .type-badge.pharmacy { background: #d1fae5; color: #059669; }
        .type-badge.laboratory { background: #fef3c7; color: #d97706; }
        .type-badge.radiology { background: #fed7aa; color: #ea580c; }
        .type-badge.other { background: #f1f5f9; color: #64748b; }

        /* Progress bar */
        .progress-bar-track {
            width: 100%;
            height: 4px;
            background: var(--bg-muted);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-top: 0.25rem;
        }
        .progress-bar-track .fill {
            height: 100%;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, var(--color-sage) 0%, var(--color-sage-dark) 100%);
            transition: width 0.6s ease;
        }

        /* Chart canvas */
        canvas {
            max-height: 140px;
            width: 100%;
        }

        /* Monthly progress bar */
        .monthly-progress {
            flex: 1;
            margin: 0 0.75rem;
        }
        .monthly-progress .track {
            width: 100%;
            height: 6px;
            background: var(--bg-muted);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .monthly-progress .track .fill {
            height: 100%;
            border-radius: var(--radius-full);
            background: linear-gradient(90deg, var(--color-sage) 0%, var(--color-sage-dark) 100%);
            transition: width 0.6s ease;
        }

        /* Page header - Hidden */
        .page-header {
            display: none !important;
        }

        /* Margin top adjustment when header removed */
        .main-content {
            margin-top: 70px !important;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content" id="mainContent">
        
        <!-- Stats Cards - Compact -->
        <div class="stats-grid">
            <div class="stat-card stat-card-sm stat-card-blue">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Revenue</p>
                        <p class="stat-value" id="reportTotal">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign" style="color:#3b82f6;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card stat-card-sm stat-card-green">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Average Transaction</p>
                        <p class="stat-value" id="avgTransaction">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-line" style="color:var(--color-success-text);"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card stat-card-sm stat-card-purple">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Transactions</p>
                        <p class="stat-value" id="totalTransactions">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-receipt" style="color:#9333ea;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row - Compact -->
        <div class="charts-grid">
            <div class="chart-container">
                <div class="section-title-sm">
                    <i class="fas fa-chart-line" style="color:var(--color-sage);"></i>
                    Revenue Trend (Last 7 Days)
                </div>
                <canvas id="revenueChart" height="130"></canvas>
            </div>
            <div class="chart-container">
                <div class="section-title-sm">
                    <i class="fas fa-chart-pie" style="color:var(--color-sage);"></i>
                    Payment Method Distribution
                </div>
                <canvas id="paymentMethodChart" height="130"></canvas>
            </div>
        </div>

        <!-- Revenue by Type / Department -->
        <div class="revenue-grid">
            <div class="chart-container">
                <div class="section-title-sm">
                    <i class="fas fa-building" style="color:var(--color-sage);"></i>
                    Revenue by Department
                </div>
                <div id="revenueByType" class="revenue-list-container">
                    <div class="empty-state-sm">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Loading data...</p>
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <div class="section-title-sm">
                    <i class="fas fa-calendar-week" style="color:var(--color-sage);"></i>
                    Monthly Summary
                </div>
                <div id="monthlySummary" class="monthly-list-container">
                    <div class="empty-state-sm">
                        <i class="fas fa-spinner fa-pulse"></i>
                        <p>Loading data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="financial-reports.js"></script>

    <!-- 🔥 FIX: Add loaded class after sidebar loads -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const checkSidebar = setInterval(function() {
                const sidebar = document.getElementById('mainSidebar');
                if (sidebar) {
                    clearInterval(checkSidebar);
                    document.getElementById('mainContent').classList.add('loaded');
                }
            }, 50);
            setTimeout(function() {
                document.getElementById('mainContent').classList.add('loaded');
            }, 1000);
        });
    </script>
    
</body>
</html>
