<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Attendance | Staff Management | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .attendance-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .attendance-row:hover {
            background-color: var(--bg-subtle);
        }
        
        /* Status badges */
        .status-present {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-absent {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-late {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-halfday {
            background: var(--color-info-bg);
            color: var(--color-info-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-holiday {
            background: var(--bg-muted);
            color: var(--color-brown-400);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .btn-success {
            background-color: var(--color-sage);
            color: white;
            border: none;
        }
        
        .btn-success:hover {
            background-color: var(--color-sage-dark);
            transform: translateY(-1px);
        }
        
        .time-input {
            width: 100px;
            padding: 0.375rem 0.625rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-input);
            font-size: 0.75rem;
            font-family: var(--font-family);
            background: var(--bg-card);
        }
        
        .time-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(181, 207, 170, 0.2);
        }
        
        .notes-input {
            width: 140px;
            padding: 0.375rem 0.625rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-input);
            font-size: 0.75rem;
            font-family: var(--font-family);
            background: var(--bg-card);
        }
        
        .notes-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(181, 207, 170, 0.2);
        }
        
        .status-select {
            padding: 0.375rem 0.625rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-input);
            font-size: 0.75rem;
            font-family: var(--font-family);
            background: var(--bg-card);
            cursor: pointer;
        }
        
        .status-select:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(181, 207, 170, 0.2);
        }
        
        .border-l-green-500 {
            border-left-color: var(--color-success-text) !important;
        }
        
        .border-l-red-500 {
            border-left-color: var(--color-error-text) !important;
        }
        
        .border-l-yellow-500 {
            border-left-color: var(--color-warning-text) !important;
        }
        
        .border-l-purple-500 {
            border-left-color: #9333ea !important;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Staff Attendance</h1>
                    <p class="page-header-subtitle">Mark daily attendance for staff members</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid var(--color-success-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Present</p>
                        <p class="stat-value text-success-text" id="presentCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-check text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-error-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Absent</p>
                        <p class="stat-value text-error-text" id="absentCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-slash text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warning-text);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Late</p>
                        <p class="stat-value text-warning-text" id="lateCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-clock text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid #9333ea;">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Staff</p>
                        <p class="stat-value" id="totalStaff">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-users text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Date Selection & Actions -->
        <div class="filter-bar">
            <div>
                <label class="form-label text-xs mb-1">Select Date</label>
                <input type="date" id="attendanceDate" class="form-input w-48">
            </div>
            <button id="loadAttendanceBtn" class="btn-primary">
                <i class="fas fa-sync-alt mr-1"></i> Load Attendance
            </button>
            <button id="saveAttendanceBtn" class="btn-success">
                <i class="fas fa-save mr-1"></i> Save Attendance
            </button>
        </div>

        <!-- Attendance Table -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-3">Staff Name</th>
                            <th class="px-5 py-3">Role</th>
                            <th class="px-5 py-3">Status</th>
                            <th class="px-5 py-3">Check In</th>
                            <th class="px-5 py-3">Check Out</th>
                            <th class="px-5 py-3">Notes</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTable">
                        <tr>
                            <td colspan="6" class="text-center py-12 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                                <p class="font-light">Loading attendance...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="attendance.js"></script>
    
</body>
</html>
