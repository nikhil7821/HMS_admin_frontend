<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Medicines | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .badge-stock-low {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-stock-normal {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-expired {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
            overflow-y: auto;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 48rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .action-edit {
            color: var(--color-sage);
            transition: var(--transition-base);
        }
        .action-edit:hover { 
            color: var(--color-sage-dark); 
        }
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
        
        .filter-input {
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-input);
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
            font-family: var(--font-family);
            width: 100%;
        }
        
        .filter-input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(181, 207, 170, 0.2);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-capsules"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Medicine Inventory</h1>
                    <p class="page-header-subtitle">Manage all medicines, stock, and pricing</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addMedicineBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Add Medicine</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-6">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Medicines</p>
                        <p class="stat-value" id="totalMedicines">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-capsules text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Low Stock</p>
                        <p class="stat-value text-warning-text" id="lowStock">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-exclamation-triangle text-warning-text"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Expiring Soon</p>
                        <p class="stat-value text-tan" id="expiringSoon">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-times text-tan"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Value</p>
                        <p class="stat-value" id="totalValue">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar using theme classes -->
        <div class="filter-bar">
            <div class="flex-1">
                <input type="text" id="searchInput" placeholder="🔍 Search by medicine name or brand..." class="filter-input">
            </div>
            <div class="w-full md:w-48">
                <select id="categoryFilter" class="form-select">
                    <option value="">All Categories</option>
                </select>
            </div>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt mr-1"></i> Reset
            </button>
        </div>

        <!-- Medicines Table -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-4 py-3">Medicine</th>
                            <th class="px-4 py-3">Category</th>
                            <th class="px-4 py-3">Stock</th>
                            <th class="px-4 py-3">Unit</th>
                            <th class="px-4 py-3">Price</th>
                            <th class="px-4 py-3">Expiry</th>
                            <th class="px-4 py-3">Status</th>
                            <th class="px-4 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="medicinesTable">
                        <tr>
                            <td colspan="8" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading medicines...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Medicine Modal - Matching theme.css structure -->
    <div id="medicineModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-capsules text-sage"></i> Add Medicine
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="medicineForm">
                <input type="hidden" id="medicineId">
                <div class="p-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Medicine Name <span class="text-error-text">*</span></label>
                            <input type="text" id="medName" class="form-input" placeholder="e.g., Paracetamol, Amoxicillin" autocomplete="off">
                            <span class="error-message" id="medNameError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Brand Name</label>
                            <input type="text" id="brand" class="form-input" placeholder="e.g., Dolo, Mox, Crocin" autocomplete="off">
                            <span class="error-message" id="brandError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category <span class="text-error-text">*</span></label>
                            <select id="category" class="form-select" required>
                                <option value="">Select Category</option>
                            </select>
                            <span class="error-message" id="categoryError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Unit <span class="text-error-text">*</span></label>
                            <select id="unit" class="form-select" required>
                                <option value="">Select Unit</option>
                            </select>
                            <span class="error-message" id="unitError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stock Quantity <span class="text-error-text">*</span></label>
                            <input type="number" id="stock" class="form-input" placeholder="0" min="0" step="1">
                            <span class="error-message" id="stockError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Unit Price (₹) <span class="text-error-text">*</span></label>
                            <input type="number" id="price" class="form-input" placeholder="0.00" min="0" step="0.01">
                            <span class="error-message" id="priceError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Expiry Date <span class="text-error-text">*</span></label>
                            <input type="date" id="expiry" class="form-input">
                            <span class="error-message" id="expiryError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Batch No.</label>
                            <input type="text" id="batchNo" class="form-input" placeholder="e.g., B001, Batch-2024-001" autocomplete="off">
                            <span class="error-message" id="batchNoError"></span>
                        </div>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-2 text-xs"></i>Save Medicine
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="medicines.js"></script>
    
</body>
</html>
