<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Purchases | Pharmacy | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           PURCHASES MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* Purchase ID badge */
        .badge-purchase {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
            font-family: monospace;
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table thead {
            background-color: var(--bg-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-300);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .data-table td {
            padding: 0.75rem 1rem;
            color: var(--color-brown-700);
            vertical-align: middle;
        }

        /* Table row hover */
        .purchase-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        .purchase-row:hover {
            background-color: var(--bg-subtle);
        }
        .purchase-row:last-child {
            border-bottom: none;
        }

        /* Action buttons */
        .action-btn {
            color: var(--color-brown-100);
            transition: var(--transition-base);
            padding: 0.25rem 0.375rem;
            border-radius: var(--radius-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .action-btn:hover {
            color: var(--color-sage-dark);
        }
        .action-btn.delete:hover {
            color: #dc2626;
        }

        /* Supplier name */
        .supplier-name {
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-700);
            font-size: 0.875rem;
        }
        .medicine-name {
            color: var(--color-brown-300);
            font-size: 0.8125rem;
        }

        /* Total amount */
        .total-amount {
            font-weight: var(--font-weight-semibold);
            color: var(--color-sage-dark);
        }

        /* Override: Add button inside filter bar */
        .filter-bar .btn-primary {
            flex: 0 0 auto !important;
            padding: 0.4rem 0.85rem !important;
            font-size: 0.8125rem !important;
            height: 38px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.35rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }
        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important;
            transform: translateY(-1px) !important;
        }

        /* Search wrapper inside filter bar */
        .filter-bar .search-wrapper {
            flex: 1 1 200px !important;
            min-width: 150px !important;
            max-width: 300px !important;
        }

        @media (max-width: 768px) {
            .filter-bar .form-select {
                min-width: 100px !important;
                font-size: 0.75rem !important;
            }
            .filter-bar .btn-primary span {
                display: none !important;
            }
            .filter-bar .search-wrapper {
                flex: 1 1 120px !important;
                min-width: 100px !important;
                max-width: 200px !important;
            }
            .filter-bar .search-input {
                font-size: 0.75rem !important;
                padding: 0.3rem 0.5rem 0.3rem 1.75rem !important;
                height: 32px !important;
            }
            .data-table th,
            .data-table td {
                padding: 0.5rem 0.5rem !important;
                font-size: 0.6875rem !important;
            }
        }

        /* Modal overrides */
        .form-card {
            border-top-color: var(--color-sage);
        }

        /* Error message */
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }

        .form-input.error,
        .form-select.error {
            border-color: var(--color-error-text);
        }
        .form-input.error:focus,
        .form-select.error:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        /* Empty state */
        .purchases-empty {
            text-align: center;
            padding: 3rem 1.25rem;
            color: var(--color-brown-100);
        }
        .purchases-empty i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }
        .purchases-empty p {
            font-size: 0.875rem;
            font-weight: var(--font-weight-light);
        }

        /* Total preview */
        .total-preview {
            background-color: var(--bg-subtle);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-default);
            margin-top: 0.5rem;
        }
        .total-preview .total-label {
            font-size: 0.6875rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-200);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .total-preview .total-amount {
            font-size: 1.125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-sage-dark);
        }
        .total-preview .total-amount.zero {
            color: var(--color-brown-100);
        }

        /* Modal grid */
        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.5rem;
        }
        .modal-grid .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 640px) {
            .modal-grid {
                grid-template-columns: 1fr;
            }
            .modal-grid .full-width {
                grid-column: 1;
            }
        }

        /* Stat card text colors */
        .text-sage {
            color: var(--color-sage);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats Cards -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Purchases</p>
                        <p class="stat-value" id="totalPurchases">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-shopping-cart" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Quantity</p>
                        <p class="stat-value" id="totalQuantity">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-boxes" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Investment</p>
                        <p class="stat-value" id="totalInvestment">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Last Updated</p>
                        <p class="stat-value" id="lastUpdated" style="font-size:1.125rem; margin-top:0.375rem;">Today</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Add Button -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search by supplier or medicine...">
            </div>
            <select id="supplierFilter" class="form-select">
                <option value="">All Suppliers</option>
            </select>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt"></i>
                <span>Reset</span>
            </button>
            <button id="addPurchaseBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                <span>New Purchase</span>
            </button>
        </div>

        <!-- Purchases Table -->
        <div class="card-white" style="margin-top: 1.5rem; overflow:hidden;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>PO #</th>
                            <th>Date</th>
                            <th>Supplier</th>
                            <th>Medicine</th>
                            <th style="text-align:center;">Qty</th>
                            <th style="text-align:center;">Unit Price</th>
                            <th style="text-align:center;">Total</th>
                            <th>Invoice</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="purchasesTable">
                        <tr>
                            <td colspan="9" style="text-align:center; padding:3rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:2rem; margin-bottom:0.75rem; display:block;"></i>
                                <p style="font-weight:var(--font-weight-light);">Loading purchases...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Purchase Modal -->
    <div id="purchaseModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="form-card" style="max-width:32rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">
                    <i class="fas fa-shopping-cart"></i>
                    New Purchase Order
                </h3>
                <button class="close-btn" id="closeModalBtn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="purchaseForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Supplier <span style="color:var(--color-error-text);">*</span></label>
                        <select id="supplierId" class="form-select" required>
                            <option value="">Select Supplier</option>
                        </select>
                        <span class="error-message" id="supplierError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Medicine <span style="color:var(--color-error-text);">*</span></label>
                        <select id="medicineId" class="form-select" required>
                            <option value="">Select Medicine</option>
                        </select>
                        <span class="error-message" id="medicineError"></span>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Quantity <span style="color:var(--color-error-text);">*</span></label>
                            <input type="number" id="quantity" class="form-input" placeholder="Enter quantity" min="1" step="1">
                            <span class="error-message" id="quantityError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Unit Price (₹) <span style="color:var(--color-error-text);">*</span></label>
                            <input type="number" id="unitPrice" class="form-input" placeholder="Enter unit price" min="0.01" step="0.01">
                            <span class="error-message" id="unitPriceError"></span>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Purchase Date <span style="color:var(--color-error-text);">*</span></label>
                            <input type="date" id="purchaseDate" class="form-input">
                            <span class="error-message" id="dateError"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Invoice Number</label>
                            <input type="text" id="invoiceNo" class="form-input" placeholder="e.g., INV-2024-001" autocomplete="off">
                            <span class="error-message" id="invoiceError"></span>
                        </div>
                    </div>
                    
                    <!-- Total Preview -->
                    <div class="total-preview">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="total-label">Total Amount:</span>
                            <span class="total-amount zero" id="totalAmountPreview">₹0.00</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        Save Purchase
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="purchases.js"></script>
    
</body>
</html>
