<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Purchases | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .badge-purchase {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
        
        /* Total preview styling */
        .total-preview {
            background-color: var(--bg-subtle);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            border: 1px solid var(--border-default);
        }
        
        .total-label {
            font-size: 0.6875rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-200);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        
        .total-amount {
            font-size: 1.125rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-sage-dark);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Purchase Orders</h1>
                    <p class="page-header-subtitle">Track medicine purchases from suppliers</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addPurchaseBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>New Purchase</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-6">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Purchases</p>
                        <p class="stat-value" id="totalPurchases">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-shopping-cart text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Quantity Purchased</p>
                        <p class="stat-value" id="totalQuantity">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-boxes text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Investment</p>
                        <p class="stat-value" id="totalInvestment">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Purchases Table Card -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-4">PO #</th>
                            <th class="px-5 py-4">Date</th>
                            <th class="px-5 py-4">Supplier</th>
                            <th class="px-5 py-4">Medicine</th>
                            <th class="px-5 py-4">Quantity</th>
                            <th class="px-5 py-4">Unit Price</th>
                            <th class="px-5 py-4">Total</th>
                            <th class="px-5 py-4">Invoice No.</th>
                            <th class="px-5 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="purchasesTable">
                        <tr>
                            <td colspan="9" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading purchases...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Purchase Modal - Matching theme.css structure -->
    <div id="purchaseModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-shopping-cart text-sage"></i> New Purchase Order
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="purchaseForm">
                <div class="p-5 space-y-4">
                    <div class="form-group">
                        <label class="form-label">Supplier <span class="text-error-text">*</span></label>
                        <select id="supplierId" class="form-select" required>
                            <option value="">Select Supplier</option>
                        </select>
                        <span class="error-message" id="supplierError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Medicine <span class="text-error-text">*</span></label>
                        <select id="medicineId" class="form-select" required>
                            <option value="">Select Medicine</option>
                        </select>
                        <span class="error-message" id="medicineError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity <span class="text-error-text">*</span></label>
                        <input type="number" id="quantity" class="form-input" placeholder="Enter quantity" min="1" step="1">
                        <span class="error-message" id="quantityError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Unit Price (₹) <span class="text-error-text">*</span></label>
                        <input type="number" id="unitPrice" class="form-input" placeholder="Enter unit price" min="0.01" step="0.01">
                        <span class="error-message" id="unitPriceError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Purchase Date <span class="text-error-text">*</span></label>
                        <input type="date" id="purchaseDate" class="form-input">
                        <span class="error-message" id="dateError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Invoice Number</label>
                        <input type="text" id="invoiceNo" class="form-input" placeholder="e.g., INV-2024-001" autocomplete="off">
                        <span class="error-message" id="invoiceError"></span>
                    </div>
                    
                    <!-- Total Preview -->
                    <div class="total-preview">
                        <div class="flex justify-between items-center">
                            <span class="total-label">Total Amount:</span>
                            <span class="total-amount" id="totalAmountPreview">₹0.00</span>
                        </div>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-2 text-xs"></i>Save Purchase
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="purchases.js"></script>
    
</body>
</html>
