<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Units | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .badge-unit {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .action-edit {
            color: var(--color-sage);
            transition: var(--transition-base);
        }
        .action-edit:hover { 
            color: var(--color-sage-dark); 
        }
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-weight-hanging"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Medicine Units</h1>
                    <p class="page-header-subtitle">Manage measurement units (mg, ml, tablets, etc.)</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addUnitBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Add Unit</span>
                </button>
            </div>
        </div>

        <!-- Units Table Card -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-4">S.No</th>
                            <th class="px-5 py-4">Unit Name</th>
                            <th class="px-5 py-4">Symbol</th>
                            <th class="px-5 py-4">Description</th>
                            <th class="px-5 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="unitsTable">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading units...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal - Matching theme.css structure -->
    <div id="unitModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-weight-hanging text-sage"></i> Add Unit
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="unitForm">
                <input type="hidden" id="unitId">
                <div class="p-5 space-y-4">
                    <div class="form-group">
                        <label class="form-label">Unit Name <span class="text-error-text">*</span></label>
                        <input type="text" id="unitName" class="form-input" placeholder="e.g., Milligram, Milliliter, Tablet" autocomplete="off">
                        <span class="error-message" id="unitNameError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Symbol <span class="text-error-text">*</span></label>
                        <input type="text" id="unitSymbol" class="form-input" placeholder="e.g., mg, ml, tab, cap" autocomplete="off" maxlength="10">
                        <span class="error-message" id="unitSymbolError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="unitDesc" rows="3" class="form-textarea" placeholder="Brief description of the unit..."></textarea>
                        <span class="error-message" id="unitDescError"></span>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-2 text-xs"></i>Save Unit
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="units.js"></script>
    
</body>
</html>
