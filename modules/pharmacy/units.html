<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Units | Pharmacy | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           UNITS MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* Unit symbol badge */
        .badge-unit {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
            font-family: monospace;
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table thead {
            background-color: var(--bg-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 1.25rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-300);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .data-table td {
            padding: 0.75rem 1.25rem;
            color: var(--color-brown-700);
            vertical-align: middle;
        }

        /* Table row hover */
        .unit-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        .unit-row:hover {
            background-color: var(--bg-subtle);
        }
        .unit-row:last-child {
            border-bottom: none;
        }

        /* Action buttons */
        .action-btn {
            color: var(--color-brown-100);
            transition: var(--transition-base);
            padding: 0.25rem 0.375rem;
            border-radius: var(--radius-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .action-btn:hover {
            color: var(--color-sage-dark);
        }
        .action-btn.edit:hover {
            color: var(--color-sage);
        }
        .action-btn.delete:hover {
            color: #dc2626;
        }

        /* Override: Add button inside filter bar */
        .filter-bar .btn-primary {
            flex: 0 0 auto !important;
            padding: 0.4rem 0.85rem !important;
            font-size: 0.8125rem !important;
            height: 38px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.35rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }
        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important;
            transform: translateY(-1px) !important;
        }

        @media (max-width: 768px) {
            .filter-bar .btn-primary span {
                display: none !important;
            }
            .data-table th,
            .data-table td {
                padding: 0.5rem 0.75rem !important;
                font-size: 0.75rem !important;
            }
        }

        /* Modal overrides */
        .form-card {
            border-top-color: var(--color-sage);
        }

        /* Error message */
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }

        .form-input.error,
        .form-select.error {
            border-color: var(--color-error-text);
        }
        .form-input.error:focus,
        .form-select.error:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        /* Empty state */
        .units-empty {
            text-align: center;
            padding: 3rem 1.25rem;
            color: var(--color-brown-100);
        }
        .units-empty i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }
        .units-empty p {
            font-size: 0.875rem;
            font-weight: var(--font-weight-light);
        }

        /* Description column truncate */
        .desc-cell {
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--color-brown-300);
            font-size: 0.8125rem;
        }

        /* S.No column */
        .sno-cell {
            color: var(--color-brown-100);
            font-size: 0.8125rem;
            font-weight: var(--font-weight-light);
        }

        /* Unit name */
        .unit-name {
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-700);
            font-size: 0.875rem;
        }

        /* Search wrapper inside filter bar */
        .filter-bar .search-wrapper {
            flex: 1 1 200px !important;
            min-width: 150px !important;
            max-width: 300px !important;
        }

        @media (max-width: 768px) {
            .filter-bar .search-wrapper {
                flex: 1 1 120px !important;
                min-width: 100px !important;
                max-width: 200px !important;
            }
            .filter-bar .search-input {
                font-size: 0.75rem !important;
                padding: 0.3rem 0.5rem 0.3rem 1.75rem !important;
                height: 32px !important;
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats Cards -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Units</p>
                        <p class="stat-value" id="totalUnits">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-weight-hanging" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Active Units</p>
                        <p class="stat-value" id="activeUnits">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">With Description</p>
                        <p class="stat-value" id="withDescCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-file-alt" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Last Updated</p>
                        <p class="stat-value" id="lastUpdated" style="font-size:1.125rem; margin-top:0.375rem;">Today</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Add Button -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search units...">
            </div>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt"></i>
                <span>Reset</span>
            </button>
            <button id="addUnitBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                <span>Add Unit</span>
            </button>
        </div>

        <!-- Units Table -->
        <div class="card-white" style="margin-top: 1.5rem; overflow:hidden;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th style="width:60px;">S.No</th>
                            <th>Unit Name</th>
                            <th style="width:100px;">Symbol</th>
                            <th>Description</th>
                            <th style="width:100px; text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="unitsTable">
                        <tr>
                            <td colspan="5" style="text-align:center; padding:3rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:2rem; margin-bottom:0.75rem; display:block;"></i>
                                <p style="font-weight:var(--font-weight-light);">Loading units...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Unit Modal -->
    <div id="unitModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="form-card" style="max-width:30rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">
                    <i class="fas fa-weight-hanging"></i>
                    Add Unit
                </h3>
                <button class="close-btn" id="closeModalBtn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="unitForm">
                <input type="hidden" id="unitId">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Unit Name <span style="color:var(--color-error-text);">*</span></label>
                        <input type="text" id="unitName" class="form-input" placeholder="e.g., Milligram, Milliliter, Tablet" autocomplete="off">
                        <span class="error-message" id="unitNameError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Symbol <span style="color:var(--color-error-text);">*</span></label>
                        <input type="text" id="unitSymbol" class="form-input" placeholder="e.g., mg, ml, tab, cap" autocomplete="off" maxlength="10">
                        <span class="error-message" id="unitSymbolError"></span>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">Description</label>
                        <textarea id="unitDesc" rows="3" class="form-textarea" placeholder="Brief description of the unit..."></textarea>
                        <span class="error-message" id="unitDescError"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        Save Unit
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="units.js"></script>
    
</body>
</html>
