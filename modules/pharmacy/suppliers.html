<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Suppliers | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .badge-contact {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.2rem 0.65rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .action-edit {
            color: var(--color-sage);
            transition: var(--transition-base);
        }
        .action-edit:hover { 
            color: var(--color-sage-dark); 
        }
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-truck"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Suppliers</h1>
                    <p class="page-header-subtitle">Manage medicine suppliers and vendors</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addSupplierBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Add Supplier</span>
                </button>
            </div>
        </div>

        <!-- Suppliers Table Card -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-4">Supplier Name</th>
                            <th class="px-5 py-4">Contact Person</th>
                            <th class="px-5 py-4">Phone</th>
                            <th class="px-5 py-4">Email</th>
                            <th class="px-5 py-4">Address</th>
                            <th class="px-5 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="suppliersTable">
                        <tr>
                            <td colspan="6" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading suppliers...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add/Edit Supplier Modal - Matching theme.css structure -->
    <div id="supplierModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-truck text-sage"></i> Add Supplier
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="supplierForm">
                <input type="hidden" id="supplierId">
                <div class="p-5 space-y-4">
                    <div class="form-group">
                        <label class="form-label">Supplier Name <span class="text-error-text">*</span></label>
                        <input type="text" id="supName" class="form-input" placeholder="e.g., Medico Pharma, HealthCare Ltd" autocomplete="off">
                        <span class="error-message" id="supNameError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Person</label>
                        <input type="text" id="contactPerson" class="form-input" placeholder="e.g., Rajesh Sharma" autocomplete="off">
                        <span class="error-message" id="contactPersonError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number <span class="text-error-text">*</span></label>
                        <input type="tel" id="phone" class="form-input" placeholder="e.g., 9876543210" autocomplete="off" maxlength="15">
                        <span class="error-message" id="phoneError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="e.g., supplier@company.com" autocomplete="off">
                        <span class="error-message" id="emailError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <textarea id="address" rows="3" class="form-textarea" placeholder="Full address with city, state, pincode"></textarea>
                        <span class="error-message" id="addressError"></span>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-2 text-xs"></i>Save Supplier
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="suppliers.js"></script>
    
</body>
</html>
