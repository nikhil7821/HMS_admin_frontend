<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stock Adjustments | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        /* Badges for adjustment types */
        .badge-add {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-remove {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-damage {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-expiry {
            background: #fef0f0;
            color: #c98a8a;
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
        
        .stock-warning {
            color: var(--color-warning-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Stock Adjustments</h1>
                    <p class="page-header-subtitle">Manage stock corrections, damages, and expiry</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="adjustBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>New Adjustment</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-6">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Adjustments</p>
                        <p class="stat-value" id="totalAdjustments">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-clipboard-list text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Stock Added</p>
                        <p class="stat-value text-success-text" id="totalAdded">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-plus-circle text-success-text"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Stock Removed</p>
                        <p class="stat-value text-warning-text" id="totalRemoved">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-minus-circle text-warning-text"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Damaged/Expired</p>
                        <p class="stat-value text-error-text" id="totalLoss">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-exclamation-triangle text-error-text"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Adjustments Table Card -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-4">Date</th>
                            <th class="px-5 py-4">Medicine</th>
                            <th class="px-5 py-4">Type</th>
                            <th class="px-5 py-4">Quantity</th>
                            <th class="px-5 py-4">Reason</th>
                            <th class="px-5 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adjustmentsTable">
                        <tr>
                            <td colspan="6" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading adjustments...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Stock Adjustment Modal - Matching theme.css structure -->
    <div id="adjustModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-clipboard-list text-sage"></i> Stock Adjustment
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="adjustForm">
                <div class="p-5 space-y-4">
                    <div class="form-group">
                        <label class="form-label">Medicine <span class="text-error-text">*</span></label>
                        <select id="medicineId" class="form-select" required>
                            <option value="">Select Medicine</option>
                        </select>
                        <span class="error-message" id="medicineError"></span>
                        <span class="stock-warning" id="stockWarning"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Adjustment Type <span class="text-error-text">*</span></label>
                        <select id="adjustType" class="form-select" required>
                            <option value="">Select Type</option>
                            <option value="Add">➕ Add Stock</option>
                            <option value="Remove">➖ Remove Stock</option>
                            <option value="Damage">⚠️ Damage</option>
                            <option value="Expiry">📅 Expiry</option>
                        </select>
                        <span class="error-message" id="typeError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity <span class="text-error-text">*</span></label>
                        <input type="number" id="quantity" class="form-input" placeholder="Enter quantity" min="1" step="1">
                        <span class="error-message" id="quantityError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Reason <span class="text-error-text">*</span></label>
                        <textarea id="reason" rows="3" class="form-textarea" placeholder="e.g., Stock received from supplier, Physical count mismatch, Damaged in transit, Expired batch"></textarea>
                        <span class="error-message" id="reasonError"></span>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-2 text-xs"></i>Save Adjustment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="stock-adjustments.js"></script>
    
</body>
</html>
