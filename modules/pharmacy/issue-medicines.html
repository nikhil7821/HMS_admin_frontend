<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Issue Medicines | Pharmacy | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .badge-issue {
            background: var(--bg-muted);
            color: var(--color-brown-300);
            padding: 0.2rem 0.85rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 28rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .action-delete {
            color: var(--color-warm-tan);
            transition: var(--transition-base);
        }
        .action-delete:hover { 
            color: var(--color-warm-tan-dark); 
        }
        
        .error-message {
            color: var(--color-error-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
        
        .stock-warning {
            color: var(--color-warning-text);
            font-size: 0.6875rem;
            margin-top: 0.25rem;
            display: block;
            font-weight: var(--font-weight-light);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-prescription-bottle"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Issue Medicines</h1>
                    <p class="page-header-subtitle">Issue medicines to patients from pharmacy</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="issueBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>New Issue</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-6">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Issues</p>
                        <p class="stat-value" id="totalIssues">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-prescription-bottle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Quantity Issued</p>
                        <p class="stat-value" id="totalQuantity">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-boxes text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Today's Issues</p>
                        <p class="stat-value" id="todayIssues">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-day text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Issues Table Card -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-4">Date</th>
                            <th class="px-5 py-4">Patient Name</th>
                            <th class="px-5 py-4">Medicine</th>
                            <th class="px-5 py-4">Quantity</th>
                            <th class="px-5 py-4">Prescribed By</th>
                            <th class="px-5 py-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="issuesTable">
                        <tr>
                            <td colspan="6" class="text-center py-8 text-brown-100">
                                <i class="fas fa-spinner fa-pulse mr-2"></i>Loading issues...
                            </table>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Issue Medicine Modal - Matching theme.css structure -->
    <div id="issueModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 id="modalTitle" class="modal-title">
                    <i class="fas fa-prescription-bottle text-sage"></i> Issue Medicine
                </h3>
                <button id="closeModalBtn" class="close-btn">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <form id="issueForm">
                <div class="p-5 space-y-4">
                    <div class="form-group">
                        <label class="form-label">Patient <span class="text-error-text">*</span></label>
                        <select id="patientId" class="form-select" required>
                            <option value="">Select Patient</option>
                        </select>
                        <span class="error-message" id="patientError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Medicine <span class="text-error-text">*</span></label>
                        <select id="medicineId" class="form-select" required>
                            <option value="">Select Medicine</option>
                        </select>
                        <span class="error-message" id="medicineError"></span>
                        <span class="stock-warning" id="stockWarning"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Quantity <span class="text-error-text">*</span></label>
                        <input type="number" id="quantity" class="form-input" placeholder="Enter quantity" min="1" step="1">
                        <span class="error-message" id="quantityError"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Prescribed By (Doctor Name)</label>
                        <input type="text" id="prescribedBy" class="form-input" placeholder="e.g., Dr. Rajesh Sharma" autocomplete="off">
                        <span class="error-message" id="prescribedError"></span>
                    </div>
                </div>
                <div class="p-5 bg-subtle rounded-b-xl flex justify-end gap-3 border-t border-default">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-check-circle mr-2 text-xs"></i>Issue Medicine
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="issue-medicines.js"></script>
    
</body>
</html>
