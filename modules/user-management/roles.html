<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roles & Permissions | User Management | MedFlow</title>
    <!-- Google Fonts: Poppins Light + Regular + Medium - SAME AS DASHBOARD -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: #fffdf9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-weight: 400;
        }
        
        /* Subtle background pattern - exactly like dashboard */
        .bg-subtle {
            background-image: radial-gradient(circle at 10% 20%, rgba(155, 184, 139, 0.03) 0%, rgba(250, 242, 228, 0) 80%);
        }
        
        /* Custom scrollbar - matching dashboard */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f0ebe4;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #d4c9bc;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #c4b8a8;
        }
        
        /* Card Styles - EXACTLY like dashboard */
        .card-white {
            background: #ffffff;
            border: 1px solid #f0e8e0;
            border-radius: 16px;
        }
        
        /* MODAL OVERLAY - PERFECT CENTERING */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-container {
            position: relative;
            width: 100%;
            max-width: 520px;
            margin: 0 20px;
        }
        
        /* MODAL CONTENT - RECTANGLE SHAPE */
        .modal-content {
            background: white;
            border-radius: 0px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.25s ease;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 18px 24px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }
        
        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin: 0;
        }
        
        .modal-body {
            padding: 24px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* Button Styles - EXACTLY like dashboard */
        .btn-primary {
            background: linear-gradient(135deg, #a8c49a 0%, #8aae7a 100%);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #9abb8a 0%, #7da06c 100%);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            border: 1px solid #cbd5e1;
            background: white;
            transition: all 0.2s ease;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #334155;
        }
        
        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        /* Form elements */
        .form-input, .form-select {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            transition: all 0.2s ease;
            background: #ffffff;
            padding: 10px 14px;
            width: 100%;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #a8c49a;
            box-shadow: 0 0 0 3px rgba(168, 196, 154, 0.2);
        }
        
        label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 6px;
            display: block;
        }
        
        .role-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .role-item:hover {
            background: #f8fafc;
        }
        
        .role-item.active {
            background: #f0fdf4;
            border-left: 3px solid #a8c49a;
        }
        
        .permission-group {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            background: #fafafa;
        }
        
        .permission-group-title {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .permission-checkbox {
            display: inline-flex;
            align-items: center;
            margin-right: 20px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .permission-checkbox input {
            width: 16px;
            height: 16px;
            margin-right: 6px;
            cursor: pointer;
            accent-color: #a8c49a;
        }
        
        .permission-checkbox span {
            font-size: 13px;
            color: #475569;
        }
        
        h1, h2, h3 {
            color: #1e293b;
        }
        
        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #94a3b8;
            transition: color 0.2s;
        }
        
        .close-btn:hover {
            color: #64748b;
        }
        
        .float-right {
            float: right;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-medium text-[#1e293b] mb-1">
                    <i class="fas fa-shield-alt text-[#a8c49a] mr-3"></i>Roles & Permissions
                </h1>
                <p class="text-[#64748b] text-sm">Manage user roles and access permissions</p>
            </div>
            <button id="addRoleBtn" class="btn-primary flex items-center gap-2 shadow-sm transition-all">
                <i class="fas fa-plus text-sm"></i>
                <span class="text-sm">Add Role</span>
            </button>
        </div>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Roles List Panel -->
            <div class="card-white p-4">
                <h2 class="font-semibold text-[#1e293b] text-base mb-3 pb-2 border-b border-[#e2e8f0]">
                    <i class="fas fa-tag text-[#a8c49a] mr-2"></i>Roles
                </h2>
                <div id="rolesList" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
            </div>

            <!-- Permissions Editor Panel -->
            <div class="lg:col-span-2 card-white p-4">
                <h2 class="font-semibold text-[#1e293b] text-base mb-3 pb-2 border-b border-[#e2e8f0]" id="selectedRoleTitle">
                    <i class="fas fa-key text-[#a8c49a] mr-2"></i>Select a role to edit permissions
                </h2>
                <div id="permissionsEditor" class="space-y-4 max-h-[500px] overflow-y-auto">
                    <div class="text-center py-8 text-[#94a3b8]">
                        <i class="fas fa-hand-pointer text-3xl mb-2 block"></i>
                        <p>Click on a role from the left panel to edit its permissions</p>
                    </div>
                </div>
                <button id="savePermissionsBtn" class="btn-success mt-4 hidden w-full md:w-auto px-6">💾 Save Permissions</button>
            </div>
        </div>
    </main>

    <!-- Add/Edit Role Modal -->
    <div id="roleModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Role</h2>
                    <button id="closeRoleModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <form id="roleForm">
                    <input type="hidden" id="roleId">
                    <div class="modal-body">
                        <div class="mb-4">
                            <label>Role Name *</label>
                            <input type="text" id="roleName" required class="form-input">
                        </div>
                        <div class="mb-4">
                            <label>Description</label>
                            <textarea id="roleDesc" rows="2" class="form-input"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelRoleModalBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Save Role</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="roles.js"></script>
</body>
</html>
