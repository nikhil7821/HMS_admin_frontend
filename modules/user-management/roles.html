<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Roles & Permissions | User Management | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .role-item {
            transition: var(--transition-base);
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        
        .role-item:hover {
            background-color: var(--bg-hover);
        }
        
        .role-item.active {
            background-color: #eef7ea;
            border-left-color: var(--color-sage);
        }
        
        .permission-group {
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 1rem;
            background-color: var(--bg-subtle);
        }
        
        .permission-group-title {
            font-weight: var(--font-weight-medium);
            font-size: 0.8125rem;
            color: var(--color-brown-700);
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-default);
        }
        
        .permission-checkbox {
            display: inline-flex;
            align-items: center;
            margin-right: 1.25rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }
        
        .permission-checkbox input {
            width: 1rem;
            height: 1rem;
            margin-right: 0.5rem;
            cursor: pointer;
            accent-color: var(--color-sage);
            border-radius: 4px;
        }
        
        .permission-checkbox span {
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-600);
        }
        
        .btn-success {
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }
        
        .btn-success:hover {
            background-color: var(--color-sage-dark) !important;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Roles & Permissions</h1>
                    <p class="page-header-subtitle">Manage user roles and access permissions</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addRoleBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Add Role</span>
                </button>
            </div>
        </div>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Roles List Panel -->
            <div class="card-white overflow-hidden">
                <div class="p-4 border-b border-default">
                    <h2 class="section-title text-base mb-0">
                        <i class="fas fa-tag text-sage"></i>
                        Roles
                    </h2>
                </div>
                <div id="rolesList" class="divide-y divide-default max-h-[500px] overflow-y-auto"></div>
            </div>

            <!-- Permissions Editor Panel -->
            <div class="lg:col-span-2 card-white overflow-hidden">
                <div class="p-4 border-b border-default">
                    <h2 class="section-title text-base mb-0" id="selectedRoleTitle">
                        <i class="fas fa-key text-sage"></i>
                        Select a role to edit permissions
                    </h2>
                </div>
                <div id="permissionsEditor" class="p-5 max-h-[500px] overflow-y-auto">
                    <div class="empty-state">
                        <i class="fas fa-hand-pointer"></i>
                        <p>Click on a role from the left panel to edit its permissions</p>
                    </div>
                </div>
                <div class="p-4 border-t border-default bg-subtle">
                    <button id="savePermissionsBtn" class="btn-primary hidden w-full md:w-auto">
                        <i class="fas fa-save mr-1"></i> Save Permissions
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Role Modal - MATCHING THEME.CSS EXACTLY -->
    <div id="roleModal" class="modal-overlay">
        <div class="form-card">
            <div class="modal-header">
                <h3 class="modal-title">
                    <i class="fas fa-plus-circle"></i> 
                    <span id="modalTitle">Add Role</span>
                </h3>
                <button id="closeRoleModalBtn" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="roleForm">
                <input type="hidden" id="roleId">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Role Name *</label>
                        <input type="text" id="roleName" name="roleName" required class="form-input" placeholder="e.g., Administrator, Doctor, Nurse">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="roleDesc" name="roleDesc" rows="3" class="form-textarea" placeholder="Brief description of this role's responsibilities"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelRoleModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save mr-1"></i> Save Role
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="roles.js"></script>
    
    <script>
        // Override the modal functions to use theme.css classes
        // This bridges your roles.js (which uses 'active' class) with theme.css (which uses 'opacity-100 visible')
        const originalOpenRoleModal = window.openRoleModal;
        const originalCloseRoleModal = window.closeRoleModal;
        
        window.openRoleModal = function() {
            const modal = document.getElementById('roleModal');
            if (modal) {
                modal.classList.add('opacity-100', 'visible');
                modal.classList.remove('opacity-0', 'invisible');
            }
            if (originalOpenRoleModal) originalOpenRoleModal();
        };
        
        window.closeRoleModal = function() {
            const modal = document.getElementById('roleModal');
            if (modal) {
                modal.classList.remove('opacity-100', 'visible');
                modal.classList.add('opacity-0', 'invisible');
            }
            if (originalCloseRoleModal) originalCloseRoleModal();
        };
        
        // Also override editRole to use the same modal opening
        const originalEditRole = window.editRole;
        window.editRole = function(id) {
            if (originalEditRole) originalEditRole(id);
            const modal = document.getElementById('roleModal');
            if (modal) {
                modal.classList.add('opacity-100', 'visible');
                modal.classList.remove('opacity-0', 'invisible');
            }
        };
        
        // Re-attach event listeners after roles.js loads
        document.addEventListener('DOMContentLoaded', function() {
            // Ensure the add button uses our override
            const addBtn = document.getElementById('addRoleBtn');
            if (addBtn) {
                addBtn.onclick = function() {
                    window.openRoleModal();
                };
            }
            
            // Ensure cancel button works
            const cancelBtn = document.getElementById('cancelRoleModalBtn');
            if (cancelBtn) {
                cancelBtn.onclick = function() {
                    window.closeRoleModal();
                };
            }
            
            const closeBtn = document.getElementById('closeRoleModalBtn');
            if (closeBtn) {
                closeBtn.onclick = function() {
                    window.closeRoleModal();
                };
            }
        });
    </script>
</body>
</html>
