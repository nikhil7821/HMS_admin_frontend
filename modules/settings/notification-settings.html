<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Settings | Settings | HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{background:#f3f4f6;}</style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-6">
        <div class="mb-6"><h1 class="text-2xl font-bold"><i class="fas fa-bell text-blue-600 mr-2"></i>Notification Settings</h1><p class="text-gray-500">Configure email, SMS, and in-app notifications</p></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Email Settings -->
            <div class="bg-white rounded-xl shadow-sm p-6"><h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-envelope text-blue-500 mr-2"></i>Email Settings</h2>
                <div class="space-y-4"><div><label class="block text-sm font-medium mb-1">SMTP Server</label><input type="text" id="smtpServer" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">SMTP Port</label><input type="text" id="smtpPort" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">Sender Email</label><input type="email" id="senderEmail" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">Sender Name</label><input type="text" id="senderName" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">SMTP Password</label><input type="password" id="smtpPassword" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="flex items-center"><input type="checkbox" id="enableEmail" class="mr-2"> <span class="text-sm">Enable Email Notifications</span></label></div>
                <button id="testEmailBtn" class="w-full bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700 transition"><i class="fas fa-paper-plane mr-1"></i> Send Test Email</button></div>
            </div>

            <!-- SMS Settings -->
            <div class="bg-white rounded-xl shadow-sm p-6"><h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-sms text-green-500 mr-2"></i>SMS Settings</h2>
                <div class="space-y-4"><div><label class="block text-sm font-medium mb-1">SMS Gateway</label><select id="smsGateway" class="w-full px-3 py-2 border rounded-lg"><option>Twilio</option><option>Nexmo</option><option>Msg91</option><option>Custom</option></select></div>
                <div><label class="block text-sm font-medium mb-1">API Key / SID</label><input type="text" id="smsApiKey" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-medium mb-1">Sender ID</label><input type="text" id="smsSenderId" class="w-full px-3 py-2 border rounded-lg"></div>
                <div><label class="flex items-center"><input type="checkbox" id="enableSms" class="mr-2"> <span class="text-sm">Enable SMS Notifications</span></label></div>
                <button id="testSmsBtn" class="w-full bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700 transition"><i class="fas fa-mobile-alt mr-1"></i> Send Test SMS</button></div>
            </div>

            <!-- Notification Events -->
            <div class="bg-white rounded-xl shadow-sm p-6 lg:col-span-2"><h2 class="text-lg font-bold mb-4 border-b pb-2"><i class="fas fa-calendar-alt text-purple-500 mr-2"></i>Notification Events</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Appointment Reminders</span><input type="checkbox" id="notifyAppointment" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Lab Results Ready</span><input type="checkbox" id="notifyLabResults" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Invoice Generation</span><input type="checkbox" id="notifyInvoice" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Payment Confirmation</span><input type="checkbox" id="notifyPayment" class="ml-4"></label></div>
                <div><label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Discharge Summary Ready</span><input type="checkbox" id="notifyDischarge" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Low Stock Alert</span><input type="checkbox" id="notifyLowStock" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Emergency Case</span><input type="checkbox" id="notifyEmergency" class="ml-4"></label>
                <label class="flex items-center justify-between p-2 hover:bg-gray-50 rounded"><span>Birthday Wishes</span><input type="checkbox" id="notifyBirthday" class="ml-4"></label></div></div>
            </div>
        </div>

        <div class="mt-6 flex justify-end gap-3"><button id="resetNotifBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-50 transition">Reset</button><button id="saveNotifBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Save Settings</button></div>
    </main>

    <script src="../../js/core/common.js"></script>
    <script src="notification-settings.js"></script>
</body>
</html>
