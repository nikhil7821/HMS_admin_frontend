<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Consultation | Clinical | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .consult-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .consult-row:hover {
            background-color: var(--bg-subtle);
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-container {
            width: 100%;
            max-width: 650px;
            margin: 1rem;
        }
        
        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border-top: 4px solid var(--color-sage);
            box-shadow: var(--shadow-lg);
            transform: scale(0.96);
            transition: var(--transition-base);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-default);
            background-color: var(--bg-card);
        }
        
        .modal-header h2 {
            font-size: 1.0625rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-700);
            margin: 0;
            display: inline-block;
        }
        
        .modal-body {
            padding: 1.25rem;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-default);
            background-color: var(--bg-subtle);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        .float-right {
            float: right;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        
        /* Detail view styling */
        .detail-section {
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-default);
        }
        
        .detail-label {
            font-size: 0.6875rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-200);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.5rem;
        }
        
        .detail-value {
            font-size: 0.875rem;
            font-weight: var(--font-weight-regular);
            color: var(--color-brown-700);
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-stethoscope"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Consultation</h1>
                    <p class="page-header-subtitle">Doctor consultation & prescription</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="newConsultBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>New Consultation</span>
                </button>
            </div>
        </div>

        <!-- Consultations Table -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-3">Patient</th>
                            <th class="px-5 py-3">Doctor</th>
                            <th class="px-5 py-3">Date</th>
                            <th class="px-5 py-3">Diagnosis</th>
                            <th class="px-5 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="consultTable">
                        <tr>
                            <td colspan="5" class="text-center py-12 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                                <p class="font-light">Loading consultations...</p>
                             </td>
                         </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- New Consultation Modal - Matching theme.css structure -->
    <div id="consultModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>New Consultation</h2>
                    <button id="closeConsultModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <form id="consultForm">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Select Patient *</label>
                            <select id="patientId" required class="form-select">
                                <option value="">-- Select Patient --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Select Doctor *</label>
                            <select id="doctorId" required class="form-select">
                                <option value="">-- Select Doctor --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Symptoms / Chief Complaints</label>
                            <textarea id="symptoms" rows="2" class="form-textarea" placeholder="Describe the patient's symptoms..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Diagnosis *</label>
                            <input type="text" id="diagnosis" required class="form-input" placeholder="Enter diagnosis">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Prescription</label>
                            <textarea id="prescription" rows="3" class="form-textarea" placeholder="Medicine, Dose, Frequency..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Additional Notes</label>
                            <textarea id="notes" rows="2" class="form-textarea" placeholder="Any additional notes..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelConsultModalBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save mr-1"></i> Save Consultation
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- View Consultation Modal - Matching theme.css structure -->
    <div id="viewModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Consultation Details</h2>
                    <button id="closeViewModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <div class="modal-body" id="viewContent">
                    <!-- Content will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" id="closeViewFooterBtn" class="btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="consultation.js"></script>
    
</body>
</html>
