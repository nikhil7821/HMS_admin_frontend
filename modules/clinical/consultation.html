<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Consultation | Clinical | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           CONSULTATION MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* Consultation table row */
        .consult-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        .consult-row:hover {
            background-color: var(--bg-subtle);
        }
        .consult-row:last-child {
            border-bottom: none;
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table thead {
            background-color: var(--bg-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 1.25rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-300);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .data-table td {
            padding: 0.75rem 1.25rem;
            color: var(--color-brown-700);
            vertical-align: middle;
        }

        /* Action buttons */
        .action-btn {
            color: var(--color-brown-100);
            transition: var(--transition-base);
            padding: 0.25rem 0.375rem;
            border-radius: var(--radius-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .action-btn:hover {
            color: var(--color-sage-dark);
        }
        .action-btn.view:hover {
            color: var(--color-gold);
        }

        /* Override: Add button inside filter bar */
        .filter-bar .btn-primary {
            flex: 0 0 auto !important;
            padding: 0.4rem 0.85rem !important;
            font-size: 0.8125rem !important;
            height: 38px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.35rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }

        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important;
            transform: translateY(-1px) !important;
        }

        @media (max-width: 768px) {
            .filter-bar .btn-primary span {
                display: none !important;
            }
            .data-table th,
            .data-table td {
                padding: 0.5rem 0.75rem !important;
                font-size: 0.75rem !important;
            }
        }

        /* Modal overrides */
        .modal-content {
            border-top: 4px solid var(--color-sage);
        }

        /* Empty state */
        .consult-empty {
            text-align: center;
            padding: 3rem 1.25rem;
            color: var(--color-brown-100);
        }
        .consult-empty i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }
        .consult-empty p {
            font-size: 0.875rem;
            font-weight: var(--font-weight-light);
        }

        /* View modal styles */
        .detail-section {
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-default);
        }
        .detail-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-size: 0.6875rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-200);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 0.875rem;
            font-weight: var(--font-weight-regular);
            color: var(--color-brown-700);
            line-height: 1.5;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 1.5rem;
        }
        @media (max-width: 640px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .prescription-box {
            background-color: var(--bg-subtle);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            border-left: 3px solid var(--color-sage);
            margin-top: 0.25rem;
        }
        .prescription-box p {
            font-size: 0.8125rem;
            color: var(--color-brown-600);
            white-space: pre-wrap;
            font-weight: var(--font-weight-light);
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats Cards -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Consultations</p>
                        <p class="stat-value" id="totalConsults">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-notes-medical" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Today</p>
                        <p class="stat-value" id="todayConsults">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-day" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">This Month</p>
                        <p class="stat-value" id="monthConsults">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">With Prescription</p>
                        <p class="stat-value" id="prescriptionCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-prescription" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Add Button -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search by patient, doctor, or diagnosis...">
            </div>
            <button id="resetFilterBtn" class="btn-secondary">
                <i class="fas fa-undo-alt"></i>
                <span>Reset</span>
            </button>
            <button id="newConsultBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                <span>New Consultation</span>
            </button>
        </div>

        <!-- Consultations Table -->
        <div class="card-white" style="margin-top: 1.5rem; overflow:hidden;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Date</th>
                            <th>Diagnosis</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="consultTable">
                        <tr>
                            <td colspan="5" style="text-align:center; padding:3rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:2rem; margin-bottom:0.75rem; display:block;"></i>
                                <p style="font-weight:var(--font-weight-light);">Loading consultations...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- New Consultation Modal - Using theme's modal system -->
    <div id="consultModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="form-card" style="max-width:48rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">
                    <i class="fas fa-stethoscope"></i>
                    New Consultation
                </h3>
                <button class="close-btn" id="closeConsultModalBtn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="consultForm">
                <div class="modal-body">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Select Patient <span style="color:var(--color-error-text);">*</span></label>
                            <select id="patientId" required class="form-select">
                                <option value="">-- Select Patient --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Select Doctor <span style="color:var(--color-error-text);">*</span></label>
                            <select id="doctorId" required class="form-select">
                                <option value="">-- Select Doctor --</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column:1 / -1;">
                            <label class="form-label">Symptoms / Chief Complaints</label>
                            <textarea id="symptoms" rows="2" class="form-textarea" placeholder="Describe the patient's symptoms..."></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Diagnosis <span style="color:var(--color-error-text);">*</span></label>
                            <input type="text" id="diagnosis" required class="form-input" placeholder="Enter diagnosis">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Date</label>
                            <input type="date" id="consultDate" class="form-input">
                        </div>
                        <div class="form-group" style="grid-column:1 / -1;">
                            <label class="form-label">Prescription</label>
                            <textarea id="prescription" rows="3" class="form-textarea" placeholder="Medicine, Dose, Frequency..."></textarea>
                        </div>
                        <div class="form-group" style="grid-column:1 / -1; margin-bottom:0;">
                            <label class="form-label">Additional Notes</label>
                            <textarea id="notes" rows="2" class="form-textarea" placeholder="Any additional notes..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelConsultModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        Save Consultation
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Consultation Modal -->
    <div id="viewModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="viewModalTitle">
        <div class="form-card" style="max-width:40rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="viewModalTitle">
                    <i class="fas fa-file-medical"></i>
                    Consultation Details
                </h3>
                <button class="close-btn" id="closeViewModalBtn" aria-label="Close view modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="viewContent">
                <!-- Content loaded dynamically -->
            </div>
            <div class="modal-footer">
                <button type="button" id="closeViewFooterBtn" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="consultation.js"></script>
    
</body>
</html>
