<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Appointments | Clinical | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .appointment-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        
        .appointment-row:hover {
            background-color: var(--bg-subtle);
        }
        
        .status-scheduled {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-completed {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-cancelled {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-container {
            width: 100%;
            max-width: 500px;
            margin: 1rem;
        }
        
        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border-top: 4px solid var(--color-sage);
            box-shadow: var(--shadow-lg);
            transform: scale(0.96);
            transition: var(--transition-base);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-default);
            background-color: var(--bg-card);
        }
        
        .modal-header h2 {
            font-size: 1.0625rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-700);
            margin: 0;
            display: inline-block;
        }
        
        .modal-body {
            padding: 1.25rem;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-default);
            background-color: var(--bg-subtle);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        .float-right {
            float: right;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Appointments</h1>
                    <p class="page-header-subtitle">Manage patient appointments</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addAppointmentBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Book Appointment</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Today</p>
                        <p class="stat-value" id="todayCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-sun text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Upcoming</p>
                        <p class="stat-value" id="upcomingCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-week text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Completed</p>
                        <p class="stat-value" id="completedCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Cancelled</p>
                        <p class="stat-value" id="cancelledCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-times-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Appointments Table -->
        <div class="card-white overflow-hidden">
            <div class="table-wrapper">
                <table class="data-table w-full">
                    <thead>
                        <tr>
                            <th class="px-5 py-3">Patient</th>
                            <th class="px-5 py-3">Doctor</th>
                            <th class="px-5 py-3">Date</th>
                            <th class="px-5 py-3">Time</th>
                            <th class="px-5 py-3">Status</th>
                            <th class="px-5 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable">
                        <tr>
                            <td colspan="6" class="text-center py-12 text-brown-100">
                                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                                <p class="font-light">Loading appointments...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Book Appointment Modal - Matching theme.css structure -->
    <div id="appointmentModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Book Appointment</h2>
                    <button id="closeAppModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <form id="appointmentForm">
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Select Patient *</label>
                            <select id="patientId" required class="form-select">
                                <option value="">-- Select Patient --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Select Doctor *</label>
                            <select id="doctorId" required class="form-select">
                                <option value="">-- Select Doctor --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Appointment Date *</label>
                            <input type="date" id="date" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Appointment Time *</label>
                            <input type="time" id="time" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select id="status" class="form-select">
                                <option value="Scheduled">Scheduled</option>
                                <option value="Completed">Completed</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelAppModalBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save mr-1"></i> Save Appointment
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal - Matching theme.css structure -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <button id="closeDeleteModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <div class="modal-body text-center">
                    <div class="w-16 h-16 bg-error-bg rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-trash-alt text-error-text text-2xl"></i>
                    </div>
                    <h3 class="text-base font-medium text-brown-700 mb-2">Delete Appointment?</h3>
                    <p class="text-brown-300 text-sm font-light">This action cannot be undone. This appointment will be permanently removed.</p>
                </div>
                <div class="modal-footer justify-center gap-3">
                    <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
                    <button id="confirmDeleteBtn" class="btn-danger">
                        <i class="fas fa-trash-alt mr-1"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="appointments.js"></script>
    
</body>
</html>
