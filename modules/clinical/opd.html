<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OPD | Clinical | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           OPD MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* OPD table row */
        .opd-row {
            transition: var(--transition-base);
            border-bottom: 1px solid var(--border-default);
        }
        .opd-row:hover {
            background-color: var(--bg-subtle);
        }
        .opd-row:last-child {
            border-bottom: none;
        }

        /* Status badges */
        .status-waiting {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        .status-completed {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        .status-in-progress {
            background: var(--color-info-bg);
            color: var(--color-info-text);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }

        /* Token badge */
        .token-badge {
            background: var(--bg-muted);
            color: var(--color-brown-600);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
            font-family: monospace;
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Data table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }
        .data-table thead {
            background-color: var(--bg-muted);
            border-bottom: 1px solid var(--border-default);
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 1.25rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-300);
            font-size: 0.6875rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .data-table td {
            padding: 0.75rem 1.25rem;
            color: var(--color-brown-700);
            vertical-align: middle;
        }

        /* Action buttons */
        .action-btn {
            color: var(--color-brown-100);
            transition: var(--transition-base);
            padding: 0.25rem 0.375rem;
            border-radius: var(--radius-sm);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .action-btn:hover {
            color: var(--color-sage-dark);
        }
        .action-btn.complete:hover {
            color: #10b981;
        }
        .action-btn.delete:hover {
            color: #dc2626;
        }

        /* Delete modal - danger variant */
        .modal-danger .modal-content {
            border-top-color: #ef4444;
        }

        .delete-icon-circle {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background-color: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #dc2626;
            font-size: 1.25rem;
        }

        /* Danger button */
        .btn-danger {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background-color: #ef4444;
            color: white;
            font-family: var(--font-family);
            font-size: 0.8125rem;
            font-weight: var(--font-weight-light);
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition-base);
        }
        .btn-danger:hover {
            background-color: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Override: Add button inside filter bar */
        .filter-bar .btn-primary {
            flex: 0 0 auto !important;
            padding: 0.4rem 0.85rem !important;
            font-size: 0.8125rem !important;
            height: 38px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.35rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }

        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important;
            transform: translateY(-1px) !important;
        }

        /* Filter bar select width */
        .filter-bar .form-select {
            min-width: 140px !important;
        }

        @media (max-width: 768px) {
            .filter-bar .form-select {
                min-width: 100px !important;
            }
            .filter-bar .btn-primary span {
                display: none !important;
            }
            .data-table th,
            .data-table td {
                padding: 0.5rem 0.75rem !important;
                font-size: 0.75rem !important;
            }
        }

        /* Modal overrides */
        .modal-content {
            border-top: 4px solid var(--color-sage);
        }

        /* Empty state */
        .opd-empty {
            text-align: center;
            padding: 3rem 1.25rem;
            color: var(--color-brown-100);
        }
        .opd-empty i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }
        .opd-empty p {
            font-size: 0.875rem;
            font-weight: var(--font-weight-light);
        }

        /* Quick filter row */
        .filter-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: var(--font-weight-light);
            border: 1px solid var(--border-default);
            background: var(--bg-card);
            color: var(--color-brown-300);
            cursor: pointer;
            transition: var(--transition-base);
        }
        .filter-btn:hover {
            background: var(--bg-hover);
            color: var(--color-brown-600);
        }
        .filter-btn.active {
            background: var(--color-sage);
            color: white;
            border-color: var(--color-sage);
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats Cards -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Today's OPD</p>
                        <p class="stat-value" id="todayOpd">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-day" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Waiting Queue</p>
                        <p class="stat-value" id="waitingQueue">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-hourglass-half" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Completed</p>
                        <p class="stat-value" id="completedOpd">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Add Button -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search by patient or doctor...">
            </div>
            <select id="statusFilter" class="form-select">
                <option value="">All Status</option>
                <option value="Waiting">Waiting</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
            <button id="resetFilterBtn" class="btn-secondary">
                <i class="fas fa-undo-alt"></i>
                <span>Reset</span>
            </button>
            <button id="newVisitBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                <span>New Visit</span>
            </button>
        </div>

        <!-- OPD Table -->
        <div class="card-white" style="margin-top: 1.5rem; overflow:hidden;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Token</th>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="opdTable">
                        <tr>
                            <td colspan="6" style="text-align:center; padding:3rem 1.25rem; color:var(--color-brown-100);">
                                <i class="fas fa-spinner fa-pulse" style="font-size:2rem; margin-bottom:0.75rem; display:block;"></i>
                                <p style="font-weight:var(--font-weight-light);">Loading OPD visits...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- New OPD Visit Modal - Using theme's modal system -->
    <div id="opdModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="form-card" style="max-width:40rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">
                    <i class="fas fa-walking"></i>
                    New OPD Visit
                </h3>
                <button class="close-btn" id="closeOpdModalBtn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="opdForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Select Patient <span style="color:var(--color-error-text);">*</span></label>
                        <select id="patientId" required class="form-select">
                            <option value="">-- Select Patient --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Select Doctor <span style="color:var(--color-error-text);">*</span></label>
                        <select id="doctorId" required class="form-select">
                            <option value="">-- Select Doctor --</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="form-label">Chief Complaint</label>
                        <textarea id="complaint" rows="3" class="form-textarea" placeholder="Describe the patient's symptoms or reason for visit..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelOpdModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-plus-circle"></i>
                        Create Visit
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay modal-danger" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="form-card" style="max-width:26rem; border-top-color:#ef4444;">
            <div class="modal-header">
                <h3 class="modal-title" id="deleteModalTitle" style="color:var(--color-brown-700);">
                    <i class="fas fa-triangle-exclamation" style="color:#ef4444;"></i>
                    Confirm Delete
                </h3>
                <button class="close-btn" id="closeDeleteModalBtn" aria-label="Close delete modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="text-align:center; padding:1.75rem 1.25rem;">
                <div class="delete-icon-circle">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <p style="font-size:0.9375rem; font-weight:var(--font-weight-medium); color:var(--color-brown-700); margin-bottom:0.5rem;">
                    Delete OPD Visit?
                </p>
                <p style="font-size:0.8125rem; color:var(--color-brown-300); font-weight:var(--font-weight-light); line-height:1.6;">
                    This action cannot be undone. This visit record will be permanently removed.
                </p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
                <button id="confirmDeleteBtn" class="btn-danger">
                    <i class="fas fa-trash-alt"></i>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="opd.js"></script>
    
</body>
</html>
