<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doctors | Clinical | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .doctor-card {
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
        }
        
        .doctor-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-sage-pale);
        }
        
        .status-badge-active {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .status-badge-inactive {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.2rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Modal overlay styles matching theme.css */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-container {
            width: 100%;
            max-width: 650px;
            margin: 1rem;
        }
        
        .modal-content {
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border-top: 4px solid var(--color-sage);
            box-shadow: var(--shadow-lg);
            transform: scale(0.96);
            transition: var(--transition-base);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-default);
            background-color: var(--bg-card);
        }
        
        .modal-header h2 {
            font-size: 1.0625rem;
            font-weight: var(--font-weight-light);
            color: var(--color-brown-700);
            margin: 0;
            display: inline-block;
        }
        
        .modal-body {
            padding: 1.25rem;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border-default);
            background-color: var(--bg-subtle);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        .float-right {
            float: right;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        
        .grid-cols-doctors {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1rem;
        }
        
        @media (min-width: 768px) {
            .grid-cols-doctors {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .grid-cols-doctors {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 1280px) {
            .grid-cols-doctors {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-user-md"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Doctor Management</h1>
                    <p class="page-header-subtitle">Manage hospital doctors and specialists</p>
                </div>
            </div>
            <div class="page-header-actions">
                <button id="addDoctorBtn" class="btn-primary">
                    <i class="fas fa-plus text-sm"></i>
                    <span>Add Doctor</span>
                </button>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Doctors</p>
                        <p class="stat-value" id="totalDoctors">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-md text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Specializations</p>
                        <p class="stat-value" id="totalSpecs">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-tag text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Active Doctors</p>
                        <p class="stat-value" id="activeDoctors">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Avg Consultation Fee</p>
                        <p class="stat-value" id="avgFees">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign text-sage text-lg"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar using theme classes -->
        <div class="filter-bar">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-brown-100 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search by name or specialization..." 
                       class="search-input pl-10">
            </div>
            <select id="specFilter" class="form-select w-auto min-w-[180px]">
                <option value="">All Specializations</option>
            </select>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt mr-1"></i> Reset
            </button>
        </div>

        <!-- Doctors Grid -->
        <div id="doctorsGrid" class="grid-cols-doctors">
            <div class="col-span-full text-center py-12 text-brown-100">
                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                <p class="font-light">Loading doctors...</p>
            </div>
        </div>
    </main>

    <!-- Add/Edit Doctor Modal - Matching theme.css structure -->
    <div id="doctorModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Add Doctor</h2>
                    <button id="closeModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <form id="doctorForm">
                    <input type="hidden" id="doctorId">
                    <div class="modal-body">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label">Full Name *</label>
                                <input type="text" id="name" required class="form-input" placeholder="Dr. Anjali Nair">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Specialization *</label>
                                <input type="text" id="specialization" required class="form-input" placeholder="Cardiologist">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Qualification *</label>
                                <input type="text" id="qualification" required class="form-input" placeholder="MD, DM">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Consultation Fee (₹) *</label>
                                <input type="number" id="fee" required class="form-input" placeholder="1500">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone *</label>
                                <input type="tel" id="phone" required class="form-input" placeholder="+91 98765 43210">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email *</label>
                                <input type="email" id="email" required class="form-input" placeholder="doctor@medflow.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Experience (years)</label>
                                <input type="number" id="experience" class="form-input" placeholder="10">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select id="status" class="form-select">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save mr-1"></i> Save Doctor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal - Matching theme.css structure -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Confirm Delete</h2>
                    <button id="closeDeleteModalBtn" class="close-btn float-right">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="clearfix"></div>
                </div>
                <div class="modal-body text-center">
                    <div class="w-16 h-16 bg-error-bg rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-trash-alt text-error-text text-2xl"></i>
                    </div>
                    <h3 class="text-base font-medium text-brown-700 mb-2">Delete Doctor?</h3>
                    <p class="text-brown-300 text-sm font-light">This action cannot be undone. All doctor data will be permanently removed.</p>
                </div>
                <div class="modal-footer justify-center gap-3">
                    <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
                    <button id="confirmDeleteBtn" class="btn-danger">
                        <i class="fas fa-trash-alt mr-1"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="doctors.js"></script>
    
</body>
</html>
