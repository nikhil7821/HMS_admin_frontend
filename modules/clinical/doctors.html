<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doctors | Clinical | MedFlow</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ONLY THEME CSS - NO TAILWIND -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* ============================================================
           DOCTORS MODULE — Page-specific only
           All base styles come from theme.css
           ============================================================ */

        /* Doctor card - extends theme's card-white */
        .doctor-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            padding: 1rem;
            transition: var(--transition-base);
        }
        .doctor-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-sage-pale);
        }

        /* Doctor avatar - small circle */
        .doctor-avatar {
            width: 2.5rem;
            height: 2.5rem;
            background: linear-gradient(135deg, var(--color-sage) 0%, var(--color-sage-dark) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
            flex-shrink: 0;
        }

        /* Doctor info */
        .doctor-name {
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
            color: var(--color-brown-700);
            line-height: 1.3;
        }
        .doctor-spec {
            font-size: 0.75rem;
            color: var(--color-sage);
            font-weight: var(--font-weight-light);
        }

        /* Doctor meta items */
        .doctor-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--color-brown-300);
            font-weight: var(--font-weight-light);
        }
        .doctor-meta i {
            width: 1rem;
            color: var(--color-brown-100);
            font-size: 0.6875rem;
            text-align: center;
        }

        /* Grid - matches theme patterns */
        .doctors-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 640px)  { .doctors-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .doctors-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1280px) { .doctors-grid { grid-template-columns: repeat(4, 1fr); } }

        /* Status badges - use theme badge classes */
        .status-badge-active {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
        }
        .status-badge-inactive {
            background: var(--color-error-bg);
            color: var(--color-error-text);
            padding: 0.15rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
        }

        /* Empty state */
        .doctors-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1.25rem;
            color: var(--color-brown-100);
        }
        .doctors-empty i {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
            opacity: 0.4;
        }

        /* Delete modal - danger variant */
        .modal-danger .modal-content {
            border-top-color: #ef4444;
        }

        .delete-icon-circle {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background-color: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #dc2626;
            font-size: 1.25rem;
        }

        /* Danger button */
        .btn-danger {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background-color: #ef4444;
            color: white;
            font-family: var(--font-family);
            font-size: 0.8125rem;
            font-weight: var(--font-weight-light);
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition-base);
        }
        .btn-danger:hover {
            background-color: #dc2626;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Override: Filter bar select width */
        .filter-bar .form-select {
            min-width: 160px !important;
        }

        /* Override: Add button inside filter bar */
        .filter-bar .btn-primary {
            flex: 0 0 auto !important;
            padding: 0.4rem 0.85rem !important;
            font-size: 0.8125rem !important;
            height: 38px !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.35rem !important;
            border-radius: var(--radius-md) !important;
            white-space: nowrap !important;
            background-color: var(--color-sage) !important;
            color: white !important;
            border: none !important;
        }

        .filter-bar .btn-primary:hover {
            background-color: var(--color-sage-dark) !important;
            box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important;
            transform: translateY(-1px) !important;
        }

        @media (max-width: 768px) {
            .filter-bar .form-select {
                min-width: 120px !important;
            }
            .filter-bar .btn-primary span {
                display: none !important;
            }
        }

        /* Modal overrides - using theme's modal system */
        .modal-content {
            border-top: 4px solid var(--color-sage);
        }

        /* Icon button */
        .icon-btn {
            width: 2rem;
            height: 2rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-default);
            background-color: var(--bg-card);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition-base);
            font-size: 0.75rem;
            color: var(--color-brown-200);
        }
        .icon-btn:hover {
            background-color: var(--bg-hover);
            color: var(--color-brown-600);
            border-color: var(--color-brown-100);
        }
        .icon-btn.delete:hover {
            background-color: #fee2e2;
            color: #dc2626;
            border-color: #fca5a5;
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats Cards -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Total Doctors</p>
                        <p class="stat-value" id="totalDoctors">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-md" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Specializations</p>
                        <p class="stat-value" id="totalSpecs">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-tag" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Active Doctors</p>
                        <p class="stat-value" id="activeDoctors">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-check-circle" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <p class="stat-label">Avg Consultation Fee</p>
                        <p class="stat-value" id="avgFees">₹0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-rupee-sign" style="color:var(--color-sage); font-size:1.125rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Add Button -->
        <div class="filter-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name or specialization...">
            </div>
            <select id="specFilter" class="form-select">
                <option value="">All Specializations</option>
            </select>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt"></i>
                <span>Reset</span>
            </button>
            <button id="addDoctorBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                <span>Add Doctor</span>
            </button>
        </div>

        <!-- Doctors Grid -->
        <div class="doctors-grid" id="doctorsGrid" style="margin-top: 1.5rem;">
            <!-- Loading shimmer -->
            <div class="doctor-card">
                <div class="loading-shimmer" style="height:2.5rem; width:2.5rem; border-radius:50%; margin-bottom:0.75rem;"></div>
                <div class="loading-shimmer" style="height:1rem; width:70%; margin-bottom:0.5rem;"></div>
                <div class="loading-shimmer" style="height:0.75rem; width:50%;"></div>
            </div>
            <div class="doctor-card">
                <div class="loading-shimmer" style="height:2.5rem; width:2.5rem; border-radius:50%; margin-bottom:0.75rem;"></div>
                <div class="loading-shimmer" style="height:1rem; width:65%; margin-bottom:0.5rem;"></div>
                <div class="loading-shimmer" style="height:0.75rem; width:45%;"></div>
            </div>
            <div class="doctor-card">
                <div class="loading-shimmer" style="height:2.5rem; width:2.5rem; border-radius:50%; margin-bottom:0.75rem;"></div>
                <div class="loading-shimmer" style="height:1rem; width:75%; margin-bottom:0.5rem;"></div>
                <div class="loading-shimmer" style="height:0.75rem; width:55%;"></div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Modal - Using theme's modal system -->
    <div id="doctorModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="form-card" style="max-width:48rem;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">
                    <i class="fas fa-user-md"></i>
                    Add Doctor
                </h3>
                <button class="close-btn" id="closeModalBtn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="doctorForm">
                <input type="hidden" id="doctorId">
                <div class="modal-body">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Full Name <span style="color:var(--color-error-text);">*</span></label>
                            <input type="text" id="name" required class="form-input" placeholder="Dr. Anjali Nair">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Specialization <span style="color:var(--color-error-text);">*</span></label>
                            <input type="text" id="specialization" required class="form-input" placeholder="Cardiologist">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Qualification <span style="color:var(--color-error-text);">*</span></label>
                            <input type="text" id="qualification" required class="form-input" placeholder="MD, DM">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Consultation Fee (₹) <span style="color:var(--color-error-text);">*</span></label>
                            <input type="number" id="fee" required class="form-input" placeholder="1500">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone <span style="color:var(--color-error-text);">*</span></label>
                            <input type="tel" id="phone" required class="form-input" placeholder="+91 98765 43210">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email <span style="color:var(--color-error-text);">*</span></label>
                            <input type="email" id="email" required class="form-input" placeholder="doctor@medflow.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Experience (years)</label>
                            <input type="number" id="experience" class="form-input" placeholder="10">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select id="status" class="form-select">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        Save Doctor
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay modal-danger" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="form-card" style="max-width:26rem; border-top-color:#ef4444;">
            <div class="modal-header">
                <h3 class="modal-title" id="deleteModalTitle" style="color:var(--color-brown-700);">
                    <i class="fas fa-triangle-exclamation" style="color:#ef4444;"></i>
                    Confirm Delete
                </h3>
                <button class="close-btn" id="closeDeleteModalBtn" aria-label="Close delete modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="text-align:center; padding:1.75rem 1.25rem;">
                <div class="delete-icon-circle">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <p style="font-size:0.9375rem; font-weight:var(--font-weight-medium); color:var(--color-brown-700); margin-bottom:0.5rem;">
                    Delete Doctor?
                </p>
                <p style="font-size:0.8125rem; color:var(--color-brown-300); font-weight:var(--font-weight-light); line-height:1.6;">
                    This action cannot be undone. All doctor data will be permanently removed.
                </p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
                <button id="confirmDeleteBtn" class="btn-danger">
                    <i class="fas fa-trash-alt"></i>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="../../js/core/form-validation.js"></script>
    <script src="doctors.js"></script>
    
</body>
</html>
