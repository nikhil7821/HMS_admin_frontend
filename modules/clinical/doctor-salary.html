<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Doctor Salary | Clinical | MedFlow</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        .salary-row { transition: var(--transition-base); border-bottom: 1px solid var(--border-default); }
        .salary-row:hover { background-color: var(--bg-subtle); }
        .salary-row:last-child { border-bottom: none; }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .data-table thead { background-color: var(--bg-muted); border-bottom: 1px solid var(--border-default); }
        .data-table th { text-align: left; padding: 0.75rem 1.25rem; font-weight: var(--font-weight-medium); color: var(--color-brown-300); font-size: 0.6875rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .data-table td { padding: 0.75rem 1.25rem; color: var(--color-brown-700); vertical-align: middle; }
        .action-btn { color: var(--color-brown-100); transition: var(--transition-base); padding: 0.25rem 0.375rem; border-radius: var(--radius-sm); background: none; border: none; cursor: pointer; font-size: 0.875rem; }
        .action-btn:hover { color: var(--color-sage-dark); }
        .filter-bar .btn-primary { flex: 0 0 auto !important; padding: 0.4rem 0.85rem !important; font-size: 0.8125rem !important; height: 38px !important; display: inline-flex !important; align-items: center !important; gap: 0.35rem !important; border-radius: var(--radius-md) !important; white-space: nowrap !important; background-color: var(--color-sage) !important; color: white !important; border: none !important; }
        .filter-bar .btn-primary:hover { background-color: var(--color-sage-dark) !important; box-shadow: 0 4px 12px rgba(138, 174, 122, 0.35) !important; transform: translateY(-1px) !important; }
        @media (max-width: 768px) { .filter-bar .btn-primary span { display: none !important; } .data-table th, .data-table td { padding: 0.5rem 0.75rem !important; font-size: 0.75rem !important; } }
        .empty-state { text-align: center; padding: 3rem 1.25rem; color: var(--color-brown-100); }
        .empty-state i { font-size: 2rem; margin-bottom: 0.75rem; display: block; opacity: 0.4; }
        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .stat-icon-bg { width: 2.5rem; height: 2.5rem; border-radius: var(--radius-md); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        @media (max-width: 1024px) { .grid-stats { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .grid-stats { grid-template-columns: 1fr; } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
        .modal-overlay.active { display: flex !important; }
        .form-card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 1.5rem; border-top: 4px solid var(--color-sage); }
        .form-card-wide { max-width: 720px !important; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-default); }
        .modal-title { font-size: 1rem; font-weight: var(--font-weight-medium); color: var(--color-brown-700); display: flex; align-items: center; gap: 0.5rem; }
        .close-btn { background: none; border: none; color: var(--color-brown-100); font-size: 1.125rem; cursor: pointer; padding: 0.25rem; transition: var(--transition-base); }
        .close-btn:hover { color: var(--color-brown-600); transform: rotate(90deg); }
        .modal-body { margin-bottom: 1.25rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-default); }
        .detail-section { margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-default); }
        .detail-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .detail-label { font-size: 0.6875rem; font-weight: var(--font-weight-light); color: var(--color-brown-200); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.25rem; }
        .detail-value { font-size: 0.875rem; font-weight: var(--font-weight-regular); color: var(--color-brown-700); line-height: 1.5; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
        @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
        .detail-modal-content { max-width: 550px; }
        .salary-highlight { color: var(--color-sage-dark); font-weight: var(--font-weight-medium); }
        .salary-bonus { color: var(--color-gold); font-weight: var(--font-weight-medium); }
        .salary-deduction { color: #ef4444; }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        
        <!-- Stats -->
        <div class="grid-stats" style="margin-bottom: 1.5rem;">
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><p class="stat-label">Total Records</p><p class="stat-value" id="totalRecords">0</p></div>
                    <div class="stat-icon-bg"><i class="fas fa-file-invoice" style="color:var(--color-sage); font-size:1.125rem;"></i></div>
                </div>
            </div>
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><p class="stat-label">Total Salary</p><p class="stat-value" id="totalSalary">₹0</p></div>
                    <div class="stat-icon-bg"><i class="fas fa-money-bill-wave" style="color:var(--color-sage); font-size:1.125rem;"></i></div>
                </div>
            </div>
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><p class="stat-label">Average Salary</p><p class="stat-value" id="avgSalary">₹0</p></div>
                    <div class="stat-icon-bg"><i class="fas fa-chart-line" style="color:var(--color-sage); font-size:1.125rem;"></i></div>
                </div>
            </div>
            <div class="stat-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><p class="stat-label">Highest Salary</p><p class="stat-value" id="highestSalary">₹0</p></div>
                    <div class="stat-icon-bg"><i class="fas fa-trophy" style="color:var(--color-sage); font-size:1.125rem;"></i></div>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <select id="salaryDoctorFilter" class="form-select"><option value="">All Doctors</option></select>
            <select id="salaryMonthFilter" class="form-select"><option value="-1">All Months</option></select>
            <select id="salaryYearFilter" class="form-select"><option value="-1">All Years</option></select>
            <button id="resetSalaryFilter" class="btn-secondary"><i class="fas fa-undo-alt"></i> <span>Reset</span></button>
            <button id="generateSalaryBtn" class="btn-primary"><i class="fas fa-sync-alt"></i> <span>Generate Salary</span></button>
        </div>

        <!-- Table -->
        <div class="card-white" style="margin-top:1.5rem; overflow:hidden;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Doctor</th>
                            <th>Month</th>
                            <th>Activities</th>
                            <th>Before Bonus</th>
                            <th>Bonus</th>
                            <th>Final Salary</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="salaryTableBody">
                        <tr><td colspan="7" class="empty-state"><i class="fas fa-spinner fa-pulse"></i><p>Loading...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Generate Salary Modal -->
    <div id="generateSalaryModal" class="modal-overlay">
        <div class="form-card">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-sync-alt" style="color:var(--color-sage);"></i> Generate Salary</h3>
                <button class="close-btn" id="closeGenerateSalaryModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label class="form-label">Select Month <span style="color:var(--color-error-text);">*</span></label><select id="generateMonth" class="form-select"></select></div>
                <div class="form-group"><label class="form-label">Select Year <span style="color:var(--color-error-text);">*</span></label><select id="generateYear" class="form-select"></select></div>
                <div class="form-group"><label class="form-label">Doctor (Optional)</label><select id="generateDoctorId" class="form-select"><option value="">All Doctors</option></select></div>
                <p style="font-size:0.75rem; color:var(--color-brown-100); margin-top:0.5rem;">⚠️ This will calculate salary based on consultations, surgeries, emergency cases, and external visits.</p>
            </div>
            <div class="modal-footer">
                <button type="button" id="cancelGenerateSalaryBtn" class="btn-secondary">Cancel</button>
                <button type="button" id="confirmGenerateSalaryBtn" class="btn-primary"><i class="fas fa-check"></i> Generate</button>
            </div>
        </div>
    </div>

    <!-- View Salary Modal -->
    <div id="viewSalaryModal" class="modal-overlay">
        <div class="form-card detail-modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="viewSalaryModalTitle"><i class="fas fa-eye" style="color:var(--color-sage);"></i> Salary Details</h3>
                <button class="close-btn" id="closeViewSalaryModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="viewSalaryContent"></div>
            <div class="modal-footer">
                <button type="button" id="closeViewSalaryModalFooterBtn" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="../../js/core/common.js"></script>
    <script src="doctor-salary.js"></script>
</body>
</html>
