<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Prescriptions | Documents | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .prescription-card {
            transition: var(--transition-base);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-left: 3px solid var(--color-sage);
        }
        
        .prescription-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            border-color: var(--color-sage-pale);
            border-left-color: var(--color-sage-dark);
        }
        
        /* Smaller prescription card content */
        .prescription-card .patient-name {
            font-size: 0.8125rem !important;
            font-weight: var(--font-weight-medium) !important;
        }
        
        .prescription-card .doctor-name {
            font-size: 0.6875rem !important;
            color: var(--color-brown-300) !important;
        }
        
        .prescription-card .date-text {
            font-size: 0.625rem !important;
            color: var(--color-brown-100) !important;
        }
        
        .prescription-card .diagnosis-text {
            font-size: 0.6875rem !important;
            color: var(--color-brown-600) !important;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .prescription-card .medicines-text {
            font-size: 0.6875rem !important;
            color: var(--color-sage-dark) !important;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Modal overlay styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 48rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .btn-print {
            background-color: var(--color-warm-tan);
            color: white;
            border: none;
        }
        
        .btn-print:hover {
            background-color: var(--color-warm-tan-dark);
            transform: translateY(-1px);
        }
        
        /* Prescriptions Grid - 5 cards per row */
        .grid-prescriptions {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1rem;
        }
        
        @media (min-width: 640px) {
            .grid-prescriptions {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .grid-prescriptions {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1280px) {
            .grid-prescriptions {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 1536px) {
            .grid-prescriptions {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        /* Print styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #printablePrescription, #printablePrescription * {
                visibility: visible;
            }
            #printablePrescription {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                padding: 20px;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-prescription-bottle"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Prescriptions</h1>
                    <p class="page-header-subtitle">Manage patient prescriptions and medication history</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards - Keeping theme.css size -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid var(--color-sage);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Prescriptions</p>
                        <p class="stat-value" id="totalPrescriptions">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-prescription-bottle text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-sage-dark);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">This Month</p>
                        <p class="stat-value text-sage-dark" id="monthPrescriptions">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt text-sage-dark"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-gold);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Active Patients</p>
                        <p class="stat-value text-gold" id="activePatients">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-user-check text-gold"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warm-tan);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Unique Medicines</p>
                        <p class="stat-value text-tan" id="uniqueMedicines">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-capsules text-tan"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar using theme classes -->
        <div class="filter-bar">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-brown-100 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search by patient name, doctor or medicine..." 
                       class="search-input pl-10">
            </div>
            <div class="w-full md:w-56">
                <select id="patientFilter" class="form-select">
                    <option value="">All Patients</option>
                </select>
            </div>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt mr-1"></i> Reset
            </button>
        </div>

        <!-- Prescriptions Grid - 5 cards per row on 2K screens -->
        <div id="prescriptionsGrid" class="grid-prescriptions">
            <div class="col-span-full text-center py-12 text-brown-100">
                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                <p class="font-light">Loading prescriptions...</p>
            </div>
        </div>
    </main>

    <!-- Prescription Details Modal -->
    <div id="prescriptionModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 class="modal-title">
                    <i class="fas fa-prescription-bottle text-sage"></i> Prescription Details
                </h3>
                <div class="flex gap-2">
                    <button id="printModalBtn" class="btn-print px-3 py-1.5 rounded-lg text-sm">
                        <i class="fas fa-print mr-1"></i> Print
                    </button>
                    <button id="closeModalBtn" class="close-btn">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>
            </div>
            <div id="prescriptionDetails" class="p-5"></div>
        </div>
    </div>

    <!-- Hidden Printable Prescription Template -->
    <div id="printablePrescription" style="display: none;"></div>

    <script src="../../js/core/common.js"></script>
    <script src="prescriptions.js"></script>
    
</body>
</html>
