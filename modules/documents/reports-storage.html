<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reports Storage | Documents | MedFlow</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- ✅ CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="../../css/theme.css">

    <style>
        /* Additional page-specific styles that align with theme */
        .report-card {
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-left: 4px solid var(--color-sage);
        }
        
        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--color-sage-pale);
            border-left-color: var(--color-sage-dark);
        }
        
        /* Badge styles */
        .badge-lab {
            background: var(--color-success-bg);
            color: var(--color-success-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-radiology {
            background: var(--color-warning-bg);
            color: var(--color-warning-text);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        .badge-discharge {
            background: var(--bg-muted);
            color: var(--color-brown-400);
            padding: 0.2rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: var(--font-weight-medium);
            display: inline-block;
        }
        
        /* Report card content sizing */
        .report-card .patient-name {
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
        }
        
        .report-card .test-name {
            font-size: 0.75rem;
            color: var(--color-brown-600);
        }
        
        .report-card .report-date {
            font-size: 0.625rem;
            color: var(--color-brown-100);
        }
        
        /* Modal overlay styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-overlay);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-overlay.active .form-card {
            transform: scale(1);
        }
        
        .form-card {
            transform: scale(0.96);
            transition: var(--transition-base);
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-top: 4px solid var(--color-sage);
            width: 100%;
            max-width: 48rem;
            margin: 1rem;
            box-shadow: var(--shadow-lg);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        /* Reports Grid - 5 cards per row on large screens */
        .grid-reports {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.25rem;
        }
        
        @media (min-width: 640px) {
            .grid-reports {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .grid-reports {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1280px) {
            .grid-reports {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 1536px) {
            .grid-reports {
                grid-template-columns: repeat(5, 1fr);
            }
        }
        
        /* Print styles */
        @media print {
            body * {
                visibility: hidden;
            }
            .print-report, .print-report * {
                visibility: visible;
            }
            .print-report {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                padding: 20px;
            }
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Page Header matching theme -->
        <div class="page-header mb-6">
            <div class="page-header-left">
                <div class="page-header-icon">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <div>
                    <h1 class="page-header-title">Reports Storage</h1>
                    <p class="page-header-subtitle">Store and manage all medical reports</p>
                </div>
            </div>
        </div>

        <!-- Stats Cards using theme classes -->
        <div class="grid-stats mb-8">
            <div class="stat-card" style="border-left: 4px solid var(--color-sage);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Total Reports</p>
                        <p class="stat-value" id="totalReports">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-chart-bar text-sage text-lg"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-sage-dark);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Lab Reports</p>
                        <p class="stat-value text-sage-dark" id="labCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-microscope text-sage-dark"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-gold);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">Radiology</p>
                        <p class="stat-value text-gold" id="radiologyCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-x-ray text-gold"></i>
                    </div>
                </div>
            </div>
            
            <div class="stat-card" style="border-left: 4px solid var(--color-warm-tan);">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="stat-label">This Month</p>
                        <p class="stat-value text-tan" id="monthCount">0</p>
                    </div>
                    <div class="stat-icon-bg">
                        <i class="fas fa-calendar-alt text-tan"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filter Bar using theme classes -->
        <div class="filter-bar">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-brown-100 text-sm"></i>
                <input type="text" id="searchInput" placeholder="Search by patient name or test name..." 
                       class="search-input pl-10">
            </div>
            <div class="w-full md:w-48">
                <select id="typeFilter" class="form-select">
                    <option value="">All Types</option>
                    <option value="Lab">Lab Report</option>
                    <option value="Radiology">Radiology Report</option>
                    <option value="Discharge">Discharge Summary</option>
                </select>
            </div>
            <button id="resetFilter" class="btn-secondary">
                <i class="fas fa-undo-alt mr-1"></i> Reset
            </button>
        </div>

        <!-- Reports Grid - 5 cards per row on 2K screens -->
        <div id="reportsGrid" class="grid-reports">
            <div class="col-span-full text-center py-12 text-brown-100">
                <i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i>
                <p class="font-light">Loading reports...</p>
            </div>
        </div>
    </main>

    <!-- View Report Modal - Matching theme.css structure -->
    <div id="reportModal" class="modal-overlay">
        <div class="form-card">
            <div class="flex justify-between items-center p-5 border-b border-default">
                <h3 class="modal-title">
                    <i class="fas fa-file-alt text-sage"></i> Report Details
                </h3>
                <div class="flex gap-2">
                    <button id="printReportBtn" class="btn-primary text-sm px-3 py-1.5">
                        <i class="fas fa-print mr-1"></i> Print
                    </button>
                    <button id="closeModalBtn" class="close-btn">
                        <i class="fas fa-times text-lg"></i>
                    </button>
                </div>
            </div>
            <div id="reportDetails" class="p-5"></div>
        </div>
    </div>

    <!-- Hidden Printable Report Template -->
    <div id="printableReport" style="display: none;"></div>

    <script src="../../js/core/common.js"></script>
    <script src="reports-storage.js"></script>
    
</body>
</html>
