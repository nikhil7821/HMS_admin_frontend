<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard | MedFlow HMS</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CENTRALIZED THEME CSS -->
    <link rel="stylesheet" href="css/theme.css">
    
</head>
<body class="bg-subtle">

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="lg:ml-64 mt-16 p-5 md:p-7 transition-all duration-300 max-w-[1600px] mx-auto">
        
        <!-- Welcome Banner -->
        <div class="welcome-banner p-6 mb-8 relative">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center relative z-10">
                <div>
                    <h1 class="text-2xl md:text-3xl font-semibold mb-2 banner-greeting" id="welcomeMessage">
                        <i class="fas fa-spinner fa-pulse mr-2"></i> Loading...
                    </h1>
                    <div class="flex items-center gap-2 text-sm">
                        <i class="fas fa-calendar-week"></i>
                        <span id="currentDateTime">--</span>
                    </div>
                </div>
                <div class="mt-4 md:mt-0 bg-white/20 backdrop-blur-md rounded-xl px-5 py-2.5 border border-white/30 shadow-sm">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-chart-line text-white text-sm"></i>
                        <span class="text-sm font-medium text-white live-badge">Live · <span id="liveTimestamp">Just now</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="stat-card p-5">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[#64748b] text-xs font-medium uppercase tracking-wide">OPD Patients</p>
                        <p class="text-3xl font-medium text-[#1e293b] mt-1" id="opdCount">0</p>
                        <p class="text-[#10b981] text-xs mt-1 font-medium">Today</p>
                    </div>
                    <div class="stat-icon-bg w-12 h-12 flex items-center justify-center">
                        <i class="fas fa-walking text-[#a8c49a] text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card p-5">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[#64748b] text-xs font-medium uppercase tracking-wide">IPD Patients</p>
                        <p class="text-3xl font-medium text-[#1e293b] mt-1" id="ipdCount">0</p>
                        <p class="text-[#10b981] text-xs mt-1 font-medium">Currently Admitted</p>
                    </div>
                    <div class="stat-icon-bg w-12 h-12 flex items-center justify-center">
                        <i class="fas fa-procedures text-[#a8c49a] text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card p-5">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[#64748b] text-xs font-medium uppercase tracking-wide">Today's Revenue</p>
                        <p class="text-3xl font-medium text-[#1e293b] mt-1" id="revenueCount">₹0</p>
                        <p class="text-[#10b981] text-xs mt-1 font-medium">+12% from yesterday</p>
                    </div>
                    <div class="stat-icon-bg w-12 h-12 flex items-center justify-center">
                        <i class="fas fa-rupee-sign text-[#a8c49a] text-xl"></i>
                    </div>
                </div>
            </div>

            <div class="stat-card p-5">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[#64748b] text-xs font-medium uppercase tracking-wide">Bed Occupancy</p>
                        <p class="text-3xl font-medium text-[#1e293b] mt-1" id="bedOccupancy">0%</p>
                        <p class="text-[#64748b] text-xs mt-1 font-medium">Total Beds: <span id="totalBeds">100</span></p>
                    </div>
                    <div class="stat-icon-bg w-12 h-12 flex items-center justify-center">
                        <i class="fas fa-bed text-[#a8c49a] text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions-container p-5 mb-8">
            <div class="flex items-center gap-2 mb-4">
                <i class="fas fa-bolt text-[#a8c49a] text-base"></i>
                <h2 class="text-base font-medium text-[#1e293b]">Quick Actions</h2>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <button onclick="window.location.href='modules/clinical/patients.html'" class="quick-action-btn btn-primary flex items-center justify-center gap-2 py-2.5 rounded-xl">
                    <i class="fas fa-user-plus text-sm"></i>
                    <span class="text-sm font-medium">Add Patient</span>
                </button>
                <button onclick="window.location.href='modules/clinical/appointments.html'" class="quick-action-btn btn-primary flex items-center justify-center gap-2 py-2.5 rounded-xl">
                    <i class="fas fa-calendar-plus text-sm"></i>
                    <span class="text-sm font-medium">Book Appointment</span>
                </button>
                <button onclick="window.location.href='modules/clinical/ipd.html'" class="quick-action-btn btn-primary flex items-center justify-center gap-2 py-2.5 rounded-xl">
                    <i class="fas fa-procedures text-sm"></i>
                    <span class="text-sm font-medium">Admit Patient</span>
                </button>
                <button onclick="window.location.href='modules/billing/invoices.html'" class="quick-action-btn btn-primary flex items-center justify-center gap-2 py-2.5 rounded-xl">
                    <i class="fas fa-file-invoice-dollar text-sm"></i>
                    <span class="text-sm font-medium">Create Bill</span>
                </button>
            </div>
        </div>

        <!-- Recent Appointments Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-[#f0e8e0] overflow-hidden">
            <div class="px-5 py-4 border-b border-[#f0e8e0]">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-calendar-check text-[#a8c49a] text-base"></i>
                        <h2 class="text-base font-medium text-[#1e293b]">Recent Appointments</h2>
                    </div>
                    <button onclick="window.location.href='modules/clinical/appointments.html'" class="text-xs text-[#a8c49a] hover:text-[#8aae7a] font-medium transition">
                        View all →
                    </button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-[#faf7f2] border-b border-[#f0e8e0]">
                        <tr class="text-left data-table">
                            <th class="px-5 py-3 text-xs font-medium text-[#64748b] uppercase tracking-wider">Patient</th>
                            <th class="px-5 py-3 text-xs font-medium text-[#64748b] uppercase tracking-wider">Doctor</th>
                            <th class="px-5 py-3 text-xs font-medium text-[#64748b] uppercase tracking-wider">Date</th>
                            <th class="px-5 py-3 text-xs font-medium text-[#64748b] uppercase tracking-wider">Time</th>
                            <th class="px-5 py-3 text-xs font-medium text-[#64748b] uppercase tracking-wider">Status</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable">
                        <tr><td colspan="5" class="text-center py-12 text-[#94a3b8]"><i class="fas fa-spinner fa-pulse text-2xl mb-2 block"></i><p class="font-normal">Loading appointments...</p> </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/core/common.js"></script>
    <script src="js/core/dashboard.js"></script>
</body>
</html>
