<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Component</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .header {
            position: fixed;
            top: 0;
            right: 0;
            left: 260px;
            background: #ffffff;
            border-bottom: 1px solid #f0e8e0;
            z-index: 99;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        }
        
        .header-container {
            padding: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .header-container {
                padding-left: 1rem;
                padding-right: 1rem;
                height: 70px;
            }
        }
        
        .page-title-section {
            display: flex;
            flex-direction: column;
        }
        
        .page-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.2px;
            margin: 0;
            line-height: 1.3;
        }
        
        .page-breadcrumb {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .breadcrumb-separator {
            color: #cbd5e1;
            font-size: 0.6rem;
        }
        
        .breadcrumb-link {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .breadcrumb-link:hover {
            color: #a8c49a;
        }
        
        .breadcrumb-current {
            color: #a8c49a;
            font-weight: 500;
        }
        
        .mobile-page-title {
            display: none;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }
        
        .icon-btn {
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 36px;
            color: #b8aa9a;
            background: transparent;
            cursor: pointer;
            border: none;
        }
        
        .icon-btn:hover {
            background: #faf7f2;
            color: #a8c49a;
        }
        
        .icon-btn i {
            font-size: 1.1rem;
        }
        
        .notif-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #d8b48c;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
            width: 16px;
            height: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #a8c49a 0%, #8aae7a 100%);
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .user-avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(155, 184, 139, 0.2);
        }
        
        .user-name {
            color: #5a4a3a;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            margin-top: 0;
            width: 240px;
            background: #ffffff;
            border: 1px solid #f0e8e0;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            z-index: 100;
        }
        
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            color: #6a5a4a;
            font-size: 0.8rem;
            font-weight: 400;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .dropdown-item i {
            width: 18px;
            font-size: 0.9rem;
            color: #d4c9bc;
        }
        
        .dropdown-item:hover {
            background: #fefcf9;
            color: #a8c49a;
        }
        
        .dropdown-item:hover i {
            color: #a8c49a;
        }
        
        .dropdown-divider {
            height: 1px;
            background: #f0e8e0;
            margin: 4px 0;
        }
        
        .logout-item {
            color: #d8b48c;
        }
        
        .logout-item:hover {
            background: #fef8f0;
            color: #d4a574;
        }
        
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 36px;
            color: #b8aa9a;
            transition: all 0.2s ease;
            align-items: center;
            justify-content: center;
        }
        
        .mobile-menu-btn:hover {
            background: #faf7f2;
            color: #a8c49a;
        }
        
        .mobile-menu-btn i {
            font-size: 1.1rem;
        }
        
        .mobile-logo {
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            background: linear-gradient(135deg, #a8c49a 0%, #8aae7a 100%);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon i {
            font-size: 0.9rem;
            color: white;
        }
        
        .logo-text {
            font-weight: 600;
            font-size: 1rem;
            color: #5a4a3a;
        }
        
        .chevron-icon {
            color: #d4c9bc;
            font-size: 0.65rem;
            transition: transform 0.2s ease;
        }
        
        @media (max-width: 1024px) {
            .header {
                left: 0 !important;
            }
            .mobile-menu-btn {
                display: flex;
            }
            .mobile-logo {
                display: flex;
            }
            .page-title-section {
                display: none;
            }
            .mobile-page-title {
                display: block;
            }
            .user-name {
                display: none;
            }
            .header-container {
                height: 70px;
            }
        }
        
        .hidden {
            display: none;
        }
        
        @keyframes dropdownFade {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .dropdown-menu.show {
            display: block;
            animation: dropdownFade 0.2s ease-out;
        }
        
        .flex {
            display: flex;
        }
        
        .items-center {
            align-items: center;
        }
        
        .justify-between {
            justify-content: space-between;
        }
        
        .gap-2 {
            gap: 0.5rem;
        }
        
        .gap-3 {
            gap: 0.75rem;
        }
        
        .relative {
            position: relative;
        }
        
        .w-full {
            width: 100%;
        }
        
        .ml-2 {
            margin-left: 0.5rem;
        }
        
        @media (min-width: 768px) {
            .md\:inline {
                display: inline;
            }
            .md\:gap-3 {
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>

<header class="header" id="mainHeader">
    <div class="header-container">
        <!-- Mobile Menu Button -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>
        
        <!-- Mobile Logo -->
        <div class="mobile-logo">
            <div class="logo-icon">
                <i class="fas fa-leaf"></i>
            </div>
            <span class="logo-text">MedFlow</span>
        </div>
        
        <!-- Page Title Section - Will be populated by common.js -->
        <div class="page-title-section" id="pageTitleSection">
            <h1 class="page-title" id="pageTitle">Loading...</h1>
            <div class="page-breadcrumb" id="pageBreadcrumb">
                <span>Home</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current" id="breadcrumbCurrent">Loading...</span>
            </div>
        </div>
        
        <!-- Mobile Page Title -->
        <div class="mobile-page-title" id="mobilePageTitle">Loading...</div>
        
        <!-- Right Section -->
        <div class="flex items-center gap-2 md:gap-3">
            <!-- Notifications -->
            <div class="relative">
                <button class="icon-btn" id="notifBtn">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">3</span>
                </button>
            </div>
            
            <!-- User Profile -->
            <div class="relative">
                <div class="flex items-center gap-2" id="profileBtn" style="cursor: pointer;">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span class="user-name" id="userName">Admin User</span>
                    <i class="fas fa-chevron-down chevron-icon hidden md:inline" id="chevronIcon"></i>
                </div>
                
                <!-- Dropdown Menu -->
                <div class="dropdown-menu hidden" id="profileDropdown">
                    <a href="#" class="dropdown-item" id="profileLink">
                        <i class="fas fa-user"></i>
                        <span>My Profile</span>
                    </a>
                    <a href="#" class="dropdown-item" id="settingsLink">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item logout-item" id="logoutLink">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    // Header UI interactions only (no title logic - title is injected by common.js)
    (function() {
        // Profile dropdown
        const profileBtn = document.getElementById('profileBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const chevronIcon = document.getElementById('chevronIcon');
        
        if (profileBtn && profileDropdown) {
            profileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isHidden = profileDropdown.classList.contains('hidden');
                profileDropdown.classList.toggle('hidden');
                profileDropdown.classList.toggle('show');
                if (chevronIcon) {
                    chevronIcon.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                    profileDropdown.classList.add('hidden');
                    profileDropdown.classList.remove('show');
                    if (chevronIcon) chevronIcon.style.transform = 'rotate(0deg)';
                }
            });
        }
        
        // Load user data
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const userNameSpan = document.getElementById('userName');
        const userAvatar = document.getElementById('userAvatar');
        
        if (userNameSpan && user.name) userNameSpan.textContent = user.name;
        if (userAvatar && user.name) userAvatar.textContent = user.name.charAt(0).toUpperCase();
        
        // Notifications
        document.getElementById('notifBtn')?.addEventListener('click', () => {
            if (window.showToast) window.showToast('🔔 Notifications feature coming soon!', 'info');
            else alert('🔔 Notifications feature coming soon!');
        });
        
        // Logout
        document.getElementById('logoutLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../../login.html';
        });
        
        // Settings
        document.getElementById('settingsLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '../../modules/settings/hospital-profile.html';
        });
        
        // Profile
        document.getElementById('profileLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            if (window.showToast) window.showToast('👤 Profile page coming soon!', 'info');
        });
        
        // Mobile menu
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('mainSidebar');
        if (mobileBtn && sidebar) {
            mobileBtn.addEventListener('click', () => {
                sidebar.classList.toggle('mobile-open');
            });
        }
    })();
</script>

</body>
</html>
